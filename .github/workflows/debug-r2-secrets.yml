name: Debug R2 Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    if: vars.ADAETUM_DISABLE_ACTIONS != 'true'
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Show secret lengths
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          endpoint="$(printf '%s' "${R2_ENDPOINT}" | tr -d '\r\n' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//; s/^"(.*)"$/\1/; s/^\x27(.*)\x27$/\1/')"
          bucket="$(printf '%s' "${R2_BUCKET}" | tr -d '\r\n' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//; s/^"(.*)"$/\1/; s/^\x27(.*)\x27$/\1/')"
          echo "CLOUDFLARE_ACCOUNT_ID length=${#CLOUDFLARE_ACCOUNT_ID}"
          echo "R2_ACCESS_KEY_ID length=${#R2_ACCESS_KEY_ID}"
          echo "R2_SECRET_ACCESS_KEY length=${#R2_SECRET_ACCESS_KEY}"
          echo "R2_ENDPOINT length=${#R2_ENDPOINT}"
          echo "R2_BUCKET length=${#R2_BUCKET}"
          echo "normalized endpoint length=${#endpoint}"
          echo "normalized bucket length=${#bucket}"
          if printf '%s' "${endpoint}" | grep -Eq '^https?://[^[:space:]]+$'; then
            echo "endpoint_regex=ok"
          else
            echo "endpoint_regex=fail"
          fi
          if printf '%s' "${bucket}" | grep -Eq '^[a-z0-9]([a-z0-9-]{1,61}[a-z0-9])?$'; then
            echo "bucket_regex=ok"
          else
            echo "bucket_regex=fail"
          fi
