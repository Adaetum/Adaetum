default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        files: ^ansible/.*\.(yml|yaml)$
      - id: end-of-file-fixer
        files: ^ansible/.*\.(yml|yaml)$
      - id: trailing-whitespace
        files: ^ansible/.*\.(yml|yaml)$

  - repo: local
    hooks:
      - id: validate-platform-profile
        name: Validate platform profile
        entry: python3 tasks/scripts/validate-platform-profile.py
        language: python
        additional_dependencies: [pyyaml]
        args: [--self-test]
        pass_filenames: false
        files: ^(platform\.yaml|tasks/scripts/validate-platform-profile\.py)$
      - id: validate-setup-readiness-script
        name: Validate setup-readiness checker syntax
        entry: python3 -m py_compile .validator/validate-setup-readiness.py
        language: system
        pass_filenames: false
        files: ^\.validator/validate-setup-readiness\.py$
      - id: validate-first-run-contract
        name: Validate first-run setup contract
        entry: python3 .validator/validate-first-run-contract.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        files: ^(tasks/scripts/(clean-public-safe-config\.py|configure-platform-profile\.py|first-run-preflight\.sh|gum-ui\.sh|list-cloudflare-zones\.py|list-tailscale-tailnets\.py|manage-rocky-installer-iso\.sh|run-first-run-wizard\.sh|run-opinionated-setup\.sh|setup-credential-store\.sh)|\.github/workflows/ks-worker\.yml|\.validator/validate-first-run-contract\.py|ks-src/fragments/installers/kickstart/rocky10/00-header\.ksfrag)$
      - id: validate-control-pair-shared-helpers
        name: Validate control-pair helper ownership
        entry: python3 .validator/validate-control-pair-shared-helpers.py
        language: system
        pass_filenames: false
        files: ^(ansible/ansible-scripts/bootstrap/(control-pair-common\.sh|Phase-(50|60|70|90)/run-phase(50|60|70|90)\.sh)|\.validator/validate-control-pair-shared-helpers\.py)$
      - id: validate-host-maintenance
        name: Validate automatic host maintenance
        entry: python3 .validator/validate-host-maintenance.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        files: ^(platform\.yaml|tasks/scripts/(render-platform-profile|render-pods-config|validate-platform-profile)\.py|ansible/playbooks/day2\.yml|ansible/automation-roles/host-maintenance/.*|pods/(operations/kured\.app\.yaml(\.tmpl)?|observability/prometheus\.app\.yaml)|\.validator/validate-host-maintenance\.py)$
      - id: validate-doc-links
        name: Validate repository Markdown links
        entry: python3 .validator/validate-doc-links.py
        language: system
        pass_filenames: false
        files: ^(.+\.md|\.validator/validate-doc-links\.py)$
      - id: validate-ansible-syntax
        name: Validate Ansible playbook syntax
        entry: python3 ansible/ansible-scripts/validate-ansible-syntax.py
        language: python
        additional_dependencies:
          - ansible-core==2.19.6
        pass_filenames: false
        files: ^ansible/.*\.(yml|yaml)$
      - id: validate-actions
        name: Validate GitHub Actions YAML
        entry: python3 .validator/validate-actions.py
        language: python
        additional_dependencies: [pyyaml]
        files: ^\.github/workflows/.*\.(yml|yaml)$
      - id: validate-ks-src
        name: Validate Kickstart Source Compiler
        entry: python3 tasks/scripts/compile-kickstarts.py
        language: python
        additional_dependencies:
          - jinja2
        args:
          - --validate-all
          - --self-test
        pass_filenames: false
        files: ^(ks-src/|tasks/scripts/compile-kickstarts\.py|tasks/ks\.yml|Taskfile\.yml)
      - id: validate-firstboot-console
        name: Validate first-boot console contract
        entry: python3 .validator/validate-firstboot-console.py
        language: system
        pass_filenames: false
        files: ^(ansible/ansible-scripts/(bundle-bootstrap|bootstrap/Phase-10/run-phase10\.sh)|ks-src/fragments/shared/portable/(11-tailscale-firstboot-lib|12-tailscale-firstboot-flow)\.shfrag|ks-src/fragments/installers/kickstart/rocky10/(60-embed-repo|70-firstboot)\.ksfrag|tasks/iso\.yml|\.github/workflows/iso-build\.yml|\.validator/validate-firstboot-console\.py)$
      - id: validate-bootstrap-mode
        name: Validate Tailscale bootstrap mode detection
        entry: python3 .validator/validate-bootstrap-mode.py
        language: python
        pass_filenames: false
        files: ^(ansible/ansible-scripts/detect-cluster-bootstrap-mode\.py|\.validator/validate-bootstrap-mode\.py|ks-src/fragments/shared/portable/12-tailscale-firstboot-flow\.shfrag|ks-src/fragments/installers/kickstart/rocky10/(60-embed-repo|75-firstboot-install-handoff)\.ksfrag|tasks/iso\.yml|tasks/scripts/generate-env-files\.sh)$
      - id: render-pods-config-check
        name: Validate rendered pods config
        entry: python3 tasks/scripts/render-pods-config.py
        language: python
        args:
          - --check
        pass_filenames: false
        files: ^(pods/cluster-config/cluster-config\.env|pods/.+\.tmpl|pods/argocd/.+\.ya?ml|pods/gitea/gitea\.app\.yaml|pods/ingress/ingress-cluster-config\.yaml|tasks/scripts/render-pods-config\.py|tasks/scripts/run-opinionated-setup\.sh)
      - id: validate-pods-public-safe
        name: Validate public-safe pods templates
        entry: python3 .validator/validate-pods-public-safe.py
        language: python
        pass_filenames: false
        files: ^(pods/cluster-config/cluster-config\.env|pods/argocd/.+\.ya?ml|pods/ansible/ansible/ansible-cluster-config\.yaml|pods/gitea/gitea\.app\.yaml|pods/ingress/.+cluster-config\.yaml|pods/portal/homepage/homepage-cluster-config\.yaml|tasks/scripts/clean-public-safe-config\.py|\.validator/validate-pods-public-safe\.py)
      - id: validate-cluster-config
        name: Validate cluster config values
        entry: python3 .validator/validate-cluster-config.py
        language: python
        pass_filenames: false
        files: ^(pods/cluster-config/cluster-config\.env|\.validator/validate-cluster-config\.py)
      - id: validate-pod-app-definitions
        name: Validate pod app definitions
        entry: python3 .validator/validate-pod-app-definitions.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        files: ^(pods/.+\.app\.yaml|\.validator/validate-pod-app-definitions\.py)
      - id: validate-pods-kustomize
        name: Validate pods kustomize builds
        entry: python3 .validator/validate-pods-kustomize.py
        language: python
        pass_filenames: false
        files: ^(pods/.+/kustomization\.yaml|pods/cluster-config/cluster-config\.env|pods/.+\.ya?ml|\.validator/validate-pods-kustomize\.py)
      - id: validate-pods-template-inventory
        name: Validate pods template inventory
        entry: python3 .validator/validate-pods-template-inventory.py
        language: python
        pass_filenames: false
        files: ^(pods/.+\.tmpl|pods/argocd/.+\.ya?ml|pods/gitea/gitea\.app\.yaml|pods/ingress/ingress-cluster-config\.yaml|tasks/scripts/render-pods-config\.py|\.validator/validate-pods-template-inventory\.py)
      - id: validate-setup-pods-roundtrip
        name: Validate setup pods roundtrip
        entry: python3 .validator/validate-setup-pods-roundtrip.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        files: ^(platform\.yaml|tasks/scripts/render-platform-profile\.py|tasks/scripts/render-pods-config\.py|tasks/scripts/run-opinionated-setup\.sh|pods/cluster-config/cluster-config\.env|\.validator/validate-setup-pods-roundtrip\.py)
      - id: validate-applicationset-smoke
        name: Validate ApplicationSet smoke
        entry: python3 .validator/validate-applicationset-smoke.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        files: ^(pods/argocd/bootstrap/applicationset\.yaml|pods/.+\.app\.yaml|\.validator/validate-applicationset-smoke\.py)
      - id: validate-pods-docs
        name: Validate pods docs contract
        entry: python3 .validator/validate-pods-docs.py
        language: python
        pass_filenames: false
        files: ^(setup\.md|pods/ingress/platform-routing/README\.md|\.validator/validate-pods-docs\.py)
      - id: validate-pods-secrets
        name: Validate pods secret patterns
        entry: python3 .validator/validate-pods-secrets.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        files: ^(pods/.*|setup\.md|ansible/(Dockerfile|playbooks/(day2|platform-bootstrap)\.yml|automation-roles/argocd-install/(defaults/main\.yml|tasks/main\.yml|templates/argocd-values\.yaml\.j2)|ansible-scripts/(cron-entrypoint|run-ansible|bootstrap/(control-pair-common\.sh|Phase-(20|40|50|60|70|90)/run-phase(20|40|50|60|70|90|99)\.sh)))|\.validator/validate-pods-secrets\.py)
      - id: validate-pods-consistency
        name: Validate pods consistency
        entry: python3 .validator/validate-pods-consistency.py
        language: python
        additional_dependencies: [pyyaml]
        pass_filenames: false
        files: ^(pods/cluster-config/cluster-config\.env|pods/argocd/.+\.ya?ml|pods/gitea/gitea\.app\.yaml|pods/ingress/kustomization\.yaml|pods/ingress/ingress-cluster-config\.yaml|pods/ansible/ansible/ansible-runner-deployment\.yaml|pods/ingress/external-dns/deployment\.yaml|\.validator/validate-pods-consistency\.py)
      - id: validate-no-example-placeholders
        name: Validate generated config has no example placeholders
        entry: python3 .validator/validate-no-example-placeholders.py
        language: python
        pass_filenames: false
        files: ^(pods/cluster-config/cluster-config\.env|pods/ingress/kustomization\.yaml|pods/ingress/observability-routing/kustomization\.yaml|pods/portal/homepage/kustomization\.yaml|pods/ansible/ansible/kustomization\.yaml|dist/bootstrap-runtime\.env|dist/ks-templates/.+\.ks|tasks/scripts/run-opinionated-setup\.sh|\.validator/validate-no-example-placeholders\.py)
