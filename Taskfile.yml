version: "3"
silent: true

dotenv:
  - .env

vars:
  KS_SRC_DIR: '{{default "dist/ks-templates" .KS_SRC_DIR}}'
  KS_TEMPLATE_FILE_NAME: '{{default .LOCAL_KS_TEMPLATE_FILE_NAME .KS_TEMPLATE_FILE_NAME}}'
  KS_OUT_DIR: '{{default "dist/ks-templates" .KS_OUT_DIR}}'
  ISO_PATH: '{{default "" .ISO_PATH | default .LOCAL_ISO_PATH}}'
  ISO_OUT: '{{default "" .ISO_OUT | default .LOCAL_ISO_OUT}}'
  KS_FILE_URL: '{{default "" .KS_FILE_URL}}'
  BUNDLE_OUT: dist/ansible-runner-bundle.tar.gz
  BUNDLE_INCLUDE: 'Taskfile.yml setup.md platform.yaml docs ansible/Dockerfile ansible/ansible.cfg ansible/ansible-scripts ansible/playbooks ansible/automation-roles ansible/templates ansible/ansible-host-config-sync.yaml pods ks-src tasks .validator'
  BUNDLE_URL: '{{default "" .BUNDLE_URL}}'

includes:
  lint:
    taskfile: ./tasks/lint.yml
    dir: .
  hooks:
    taskfile: ./tasks/hooks.yml
    dir: .
  ks:
    taskfile: ./tasks/ks.yml
    dir: .
  iso:
    taskfile: ./tasks/iso.yml
    dir: .
  bundle:
    taskfile: ./tasks/bundle.yml
    dir: .
  env:
    taskfile: ./tasks/env.yml
    dir: .
  platform:
    taskfile: ./tasks/platform.yml
    dir: .
tasks:
  list:
    desc: Show the supported task list
    cmds:
      - |
        set -eu
        if [ -t 1 ]; then
          c_title="$(printf '\033[1;36m')"
          c_task="$(printf '\033[1;32m')"
          c_reset="$(printf '\033[0m')"
        else
          c_title=""
          c_task=""
          c_reset=""
        fi
        printf '%sSupported tasks:%s\n' "${c_title}" "${c_reset}"
        printf '  %stask init%s          Install setup tools and launch the guided first-run walkthrough\n' "${c_task}" "${c_reset}"
        printf '  %stask init:silent%s   Replay first-run setup from validated saved state without questions\n' "${c_task}" "${c_reset}"
        printf '  %stask init:clean%s    Run first-run setup with new provider and runtime values\n' "${c_task}" "${c_reset}"
        printf '  %stask init:dryrun%s   Walk through first-run setup without changing local or external state\n' "${c_task}" "${c_reset}"
        printf '  %stask iso:download%s  Download and verify the selected Rocky 10 Minimal installer ISO\n' "${c_task}" "${c_reset}"
        printf '  %stask initialize%s    Run or rerun the opinionated setup workflow\n' "${c_task}" "${c_reset}"
        printf '  %stask clean%s         Reset tracked public-safe config and remove derived installer artifacts\n' "${c_task}" "${c_reset}"
        printf '  %stask reset%s         Clean generated state and return the checkout to public main\n' "${c_task}" "${c_reset}"
        printf '  %stask maintainer-on%s Enable local maintainer bypass for example placeholders\n' "${c_task}" "${c_reset}"
        printf '  %stask maintainer-off%s Disable local maintainer bypass for example placeholders\n' "${c_task}" "${c_reset}"
        printf '  %stask build-iso%s     Build the local kickstart-enabled ISO\n' "${c_task}" "${c_reset}"
        printf '  %stask compile-ks%s    Validate and compile kickstart artifacts from ks-src into dist\n' "${c_task}" "${c_reset}"
        printf '  %stask check-ks%s      Validate kickstart source/compiler inputs without committed rendered files\n' "${c_task}" "${c_reset}"
        printf '  %stask publish%s       Publish kickstarts and ISO workflows\n' "${c_task}" "${c_reset}"
        printf '  %stask publish-bundle%s Force rebuild, upload, and verify the first-boot bundle/runtime env\n' "${c_task}" "${c_reset}"
        printf '  %stask fetch-logs%s    Download logs from bootstrap storage\n' "${c_task}" "${c_reset}"
        printf '  %stask fetch-backup%s  Download and extract a recovery backup\n' "${c_task}" "${c_reset}"
        printf '  %stask validate-runtime%s Validate the local bootstrap runtime payload without reinstalling\n' "${c_task}" "${c_reset}"
        printf '  %stask validate-pods-contract%s Run the full pods contract validator suite\n' "${c_task}" "${c_reset}"
        printf '  %stask platform:validate%s Validate platform.yaml\n' "${c_task}" "${c_reset}"
        printf '  %stask platform:render%s   Render platform.yaml into generated manifests\n' "${c_task}" "${c_reset}"
        printf '  %stask platform:setup%s    Run setup from the recovery repository profile\n' "${c_task}" "${c_reset}"
        printf '  %stask setup:preflight%s  Check non-secret setup readiness without changing anything\n' "${c_task}" "${c_reset}"
        printf '  %stask list%s          Show this command list\n' "${c_task}" "${c_reset}"

  initialize:
    desc: Run the opinionated initial setup workflow
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - task: env:initialize

  init:
    desc: Install setup tools and launch the guided first-run walkthrough
    cmds:
      - task: hooks:ensure
      - task: env:install:prerequisites
      - task: env:install:gum
      - task: env:install:github-cli
      - task: env:init

  init:dryrun:
    desc: Rehearse first-run setup with validations and simulated provider actions only
    cmds:
      - task: env:init:dryrun

  init:clean:
    desc: Run first-run setup while replacing saved provider and runtime values
    cmds:
      - task: hooks:ensure
      - task: env:install:prerequisites
      - task: env:install:gum
      - task: env:install:github-cli
      - task: env:init:clean

  init:silent:
    desc: Replay first-run setup from validated saved state without questions
    cmds:
      - task: hooks:ensure
      - task: env:install:prerequisites
      - task: env:install:gum
      - task: env:install:github-cli
      - task: env:init:silent

  iso:download:
    desc: Download and verify Rocky installer media (set ROCKY_ARCH, ROCKY_IMAGE_TYPE, ROCKY_RELEASE)
    cmds:
      - cmd: bash ./tasks/scripts/manage-rocky-installer-iso.sh download '{{default "x86_64" .ROCKY_ARCH}}' '{{default "minimal" .ROCKY_IMAGE_TYPE}}' '{{default "10.2" .ROCKY_RELEASE}}'
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/manage-rocky-installer-iso.sh download '{{default "x86_64" .ROCKY_ARCH}}' '{{default "minimal" .ROCKY_IMAGE_TYPE}}' '{{default "10.2" .ROCKY_RELEASE}}'
        platforms: [windows]

  clean:
    desc: Reset tracked public-safe config and remove derived installer artifacts
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - cmd: python3 ./tasks/scripts/clean-public-safe-config.py
        platforms: [linux, darwin]
      - cmd: python ./tasks/scripts/clean-public-safe-config.py
        platforms: [windows]
      - cmd: python3 ./tasks/scripts/clean-derived-setup-artifacts.py
        platforms: [linux, darwin]
      - cmd: python ./tasks/scripts/clean-derived-setup-artifacts.py
        platforms: [windows]

  reset:
    desc: Clean generated state and return the checkout to public Adaetum main
    cmds:
      - task: clean
      - cmd: |
          set -euo pipefail
          public_origin="https://github.com/Adaetum/Adaetum.git"
          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            echo "task reset must run inside a Git checkout." >&2
            exit 1
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "task reset will not discard remaining worktree changes. Commit, stash, or remove them, then rerun." >&2
            exit 1
          fi
          git remote set-url origin "${public_origin}"
          git remote set-url --push origin "${public_origin}"
          git fetch origin main
          if git show-ref --verify --quiet refs/heads/main; then
            git switch main
          else
            git switch --track -c main origin/main
          fi
          git merge --ff-only origin/main
          git branch --set-upstream-to=origin/main main >/dev/null
          echo "Reset complete: $(git rev-parse --short HEAD) on public main."
        platforms: [linux, darwin]
      - cmd: |
          $ErrorActionPreference = 'Stop'
          $publicOrigin = 'https://github.com/Adaetum/Adaetum.git'
          git rev-parse --is-inside-work-tree *> $null
          if ($LASTEXITCODE -ne 0) { throw 'task reset must run inside a Git checkout.' }
          if ((git status --porcelain)) { throw 'task reset will not discard remaining worktree changes. Commit, stash, or remove them, then rerun.' }
          git remote set-url origin $publicOrigin
          git remote set-url --push origin $publicOrigin
          git fetch origin main
          git show-ref --verify --quiet refs/heads/main
          if ($LASTEXITCODE -eq 0) { git switch main } else { git switch --track -c main origin/main }
          git merge --ff-only origin/main
          git branch --set-upstream-to=origin/main main
          Write-Output ("Reset complete: " + (git rev-parse --short HEAD) + ' on public main.')
        platforms: [windows]

  maintainer-on:
    desc: Enable local maintainer bypass for example-placeholder validators
    cmds:
      - cmd: |
          mkdir -p .git
          : > .git/adaetum-allow-example-placeholders
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -Command "New-Item -ItemType File -Force .git/adaetum-allow-example-placeholders | Out-Null"
        platforms: [windows]

  maintainer-off:
    desc: Disable local maintainer bypass for example-placeholder validators
    cmds:
      - cmd: rm -f .git/adaetum-allow-example-placeholders
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -Command "if (Test-Path .git/adaetum-allow-example-placeholders) { Remove-Item .git/adaetum-allow-example-placeholders }"
        platforms: [windows]

  build-iso:
    desc: Build the local kickstart-enabled ISO
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - task: iso:build

  compile-ks:
    desc: Validate and compile kickstart artifacts from ks-src into dist
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - task: ks:compile

  check-ks:
    desc: Validate kickstart source/compiler inputs without committed rendered files
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - task: ks:compile:check

  publish:
    desc: Publish kickstarts and ISO workflows
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - task: bundle:build
      - task: bundle:upload-r2
      - task: bundle:runtime-env:build
      - task: bundle:runtime-env:upload-r2
      - cmd: bash ./tasks/scripts/publish-artifacts.sh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/publish-artifacts.sh
        platforms: [windows]

  publish-bundle:
    desc: Force rebuild, upload, and verify the first-boot bundle/runtime env
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - task: bundle:publish:external

  fetch-logs:
    desc: Interactively download logs from KS storage
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - task: ks:logs:download:interactive

  fetch-backup:
    desc: Download and extract a recovery backup
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - task: ks:backup:download:interactive

  validate-runtime:
    desc: Validate the local bootstrap runtime payload without reinstalling
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - task: env:validate:runtime

  validate-pods-contract:
    desc: Run the full pods contract validator suite
    deps: ['hooks:ensure', 'env:install:prerequisites']
    cmds:
      - cmd: python3 ./.validator/run-pods-contract.py
        platforms: [linux, darwin]
      - cmd: python ./.validator/run-pods-contract.py
        platforms: [windows]

  setup:preflight:
    desc: Check non-secret setup readiness without changing local or external state
    cmds:
      - cmd: python3 ./.validator/validate-setup-readiness.py
        platforms: [linux, darwin]
      - cmd: python ./.validator/validate-setup-readiness.py
        platforms: [windows]

  bootstrap:phase10:validate-runtime:
    desc: Bundle-safe Phase 10 runtime payload validation
    cmds:
      - cmd: bash ./tasks/scripts/validate-bootstrap-runtime-env.sh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/validate-bootstrap-runtime-env.sh
        platforms: [windows]
