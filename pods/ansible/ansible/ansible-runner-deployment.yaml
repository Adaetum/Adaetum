apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansible-runner
  namespace: ansible
  annotations:
    secret.reloader.stakater.com/reload: gitea-registry-creds
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ansible-runner
  template:
    metadata:
      labels:
        app: ansible-runner
    spec:
      serviceAccountName: ansible-runner
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
        - name: gitea-registry-creds
      containers:
        - name: ansible-runner
          image: registry.cluster-duck.cloud/gitea-admin/ansible-runner:latest
          imagePullPolicy: Always
          env:
            - name: CRON_SCHEDULE
              value: "*/10 * * * *"
            - name: ANSIBLE_PLAYBOOK
              value: "playbooks/day2.yml"
            - name: ANSIBLE_INVENTORY
              value: "node-inventory.yml"
            - name: ANSIBLE_EXTRA_ARGS
              value: ""
            - name: TAILSCALE_DOMAIN
              value: "armadillo-peacock.ts.net"
            - name: TAILSCALE_TAILNET
              value: "armadillo-peacock.ts.net"
            - name: TAILSCALE_CLUSTER_TAG
              value: "tag:cluster"
          volumeMounts:
            - name: ansible-data
              mountPath: /ansible
            - name: day2-secrets
              mountPath: /run/secrets/adaetum
              readOnly: true
      volumes:
        - name: ansible-data
          hostPath:
            path: /opt/ansible-runner
            type: Directory
        - name: day2-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ansible-runner-openbao
