apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-admin-desired
  namespace: argocd
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: argocd-admin-desired
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: password
      remoteRef:
        key: apps/argocd/admin
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-runtime
  namespace: argocd
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    # Helm creates the rest of argocd-secret. Merge only the session-signing
    # field so Argo CD remains owner of TLS and other controller state.
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: server.secretkey
      remoteRef:
        key: apps/argocd/runtime
        property: server_secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-redis
  namespace: argocd
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: argocd-redis
    # Bootstrap creates the delivery Secret before Argo CD starts. ESO adopts
    # and updates its auth field without claiming Helm ownership.
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: auth
      remoteRef:
        key: apps/argocd/runtime
        property: redis_password
