apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-postgresql-desired
  namespace: authentik
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: authentik-postgresql-desired
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: apps/authentik/postgresql
