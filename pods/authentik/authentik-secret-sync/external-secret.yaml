apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-encryption
  namespace: authentik
spec:
  # Authentik 2023.6 and newer no longer derives stable user IDs from this
  # signing key. Rotation invalidates sessions, so both server and worker roll
  # when this delivery copy changes, but persisted configuration remains valid.
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: authentik-encryption
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: secret_key
      remoteRef:
        key: apps/authentik/encryption
        property: secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-postgresql-desired
  namespace: authentik
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: authentik-postgresql-desired
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: apps/authentik/postgresql
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
