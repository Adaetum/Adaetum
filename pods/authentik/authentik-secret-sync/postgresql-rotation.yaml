apiVersion: v1
kind: ServiceAccount
metadata:
  name: authentik-postgresql-rotation
  namespace: authentik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: authentik-postgresql-rotation
  namespace: authentik
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["authentik-postgresql"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authentik-postgresql-rotation
  namespace: authentik
subjects:
  - kind: ServiceAccount
    name: authentik-postgresql-rotation
    namespace: authentik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: authentik-postgresql-rotation
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: authentik-postgresql-rotation
  namespace: authentik
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 600
      template:
        spec:
          serviceAccountName: authentik-postgresql-rotation
          restartPolicy: Never
          initContainers:
            - name: rotate-database
              image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-ec"]
              args:
                - |
                  if cmp -s /var/run/active/password /var/run/desired/password \
                    && cmp -s /var/run/active/postgres-password /var/run/desired/postgres-password; then
                    echo "Authentik PostgreSQL roles already match OpenBao."
                    exit 0
                  fi

                  old_postgres_password="$(cat /var/run/active/postgres-password)"
                  new_postgres_password="$(cat /var/run/desired/postgres-password)"
                  new_application_password="$(cat /var/run/desired/password)"
                  export PGPASSWORD="${old_postgres_password}"

                  if psql -h authentik-postgresql -U postgres -d postgres \
                    -v ON_ERROR_STOP=1 -c 'SELECT 1' >/dev/null 2>&1; then
                    export NEW_POSTGRES_PASSWORD="${new_postgres_password}"
                    export NEW_APPLICATION_PASSWORD="${new_application_password}"
                    printf '%s\n' \
                      '\getenv new_postgres_password NEW_POSTGRES_PASSWORD' \
                      '\getenv new_application_password NEW_APPLICATION_PASSWORD' \
                      'BEGIN;' \
                      "ALTER ROLE postgres PASSWORD :'new_postgres_password';" \
                      "ALTER ROLE authentik PASSWORD :'new_application_password';" \
                      'COMMIT;' \
                      | psql -h authentik-postgresql -U postgres -d postgres -v ON_ERROR_STOP=1
                  else
                    # Continue an interrupted run whose database transaction
                    # committed before the active Secret could be promoted.
                    export PGPASSWORD="${new_postgres_password}"
                    psql -h authentik-postgresql -U postgres -d postgres \
                      -v ON_ERROR_STOP=1 -c 'SELECT 1' >/dev/null
                  fi
                  printf rotated >/work/state
              volumeMounts:
                - name: active-passwords
                  mountPath: /var/run/active
                  readOnly: true
                - name: desired-passwords
                  mountPath: /var/run/desired
                  readOnly: true
                - name: work
                  mountPath: /work
          containers:
            - name: promote-passwords
              image: registry.k8s.io/kubectl:v1.35.6@sha256:4d8c68e8c2bf360b1808927c4d39fb13998c106cac903622d127a2275c844126
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "-ec"]
              args:
                - |
                  if [[ ! -s /work/state ]]; then
                    exit 0
                  fi
                  payload="$(
                    jq -n \
                      --rawfile password /var/run/desired/password \
                      --rawfile postgresql_password /var/run/desired/password \
                      --rawfile postgres_password /var/run/desired/postgres-password \
                      '{stringData: {
                        "password": $password,
                        "postgresql_password": $postgresql_password,
                        "postgres-password": $postgres_password
                      }}'
                  )"
                  kubectl -n authentik patch secret authentik-postgresql --type=merge -p "${payload}"
                  echo "Authentik PostgreSQL delivery Secret promoted from OpenBao."
              volumeMounts:
                - name: desired-passwords
                  mountPath: /var/run/desired
                  readOnly: true
                - name: work
                  mountPath: /work
          volumes:
            - name: active-passwords
              secret:
                secretName: authentik-postgresql
                items:
                  - key: password
                    path: password
                  - key: postgres-password
                    path: postgres-password
            - name: desired-passwords
              secret:
                secretName: authentik-postgresql-desired
                items:
                  - key: password
                    path: password
                  - key: postgres-password
                    path: postgres-password
            - name: work
              emptyDir: {}
