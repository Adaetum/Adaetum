name: authentik
project: default
annotations:
  argocd.argoproj.io/sync-wave: "-17"
source_type: helm
source_repo_url: https://charts.goauthentik.io
source_chart: authentik
# Rotation relies on this chart's lifecycle and environment-value rendering.
source_target_revision: "2026.5.6"
source_helm_values: |
  authentik:
    error_reporting:
      enabled: false

  server:
    serviceAccountName: authentik-csi
    volumes:
      - name: authentik-openbao
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: authentik-openbao
    volumeMounts:
      - name: authentik-openbao
        mountPath: /run/openbao
        readOnly: true
    lifecycle:
      postStart:
        exec:
          command:
            - /bin/sh
            - -ec
            - |
              attempt=0
              until /ak-root/.venv/bin/python /manage.py shell -c \
                'import os; from authentik.core.models import User; username=os.environ["AUTHENTIK_BOOTSTRAP_ADMIN_USERNAME"]; password=os.environ["AUTHENTIK_BOOTSTRAP_PASSWORD"]; email=f"{username}@bootstrap.invalid"; user=User.objects.filter(username=username).first(); user=user or User.objects.create_superuser(username=username, email=email, password=password); user.set_password(password); user.is_active=True; user.save(); user.refresh_from_db(); assert user.check_password(password)'; do
                attempt=$((attempt + 1))
                if [ "${attempt}" -ge 60 ]; then
                  echo "failed to reconcile the Authentik administrator from its OpenBao delivery Secret" >&2
                  exit 1
                fi
                sleep 5
              done
    initContainers:
      - name: wait-for-postgresql
        image: public.ecr.aws/docker/library/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command:
          - sh
          - -ec
          - |
            until nc -z authentik-postgresql 5432; do
              echo "waiting for authentik-postgresql:5432"
              sleep 2
            done
    env:
      - name: AUTHENTIK_BOOTSTRAP_ADMIN_USERNAME
        valueFrom:
          secretKeyRef:
            name: authentik-admin
            key: admin_username
      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-encryption
            key: secret_key
      - name: AUTHENTIK_BOOTSTRAP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-admin
            key: bootstrap_password
      - name: AUTHENTIK_BOOTSTRAP_TOKEN
        valueFrom:
          secretKeyRef:
            name: authentik-admin
            key: bootstrap_token
      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-postgresql
            key: postgresql_password
    ingress:
      # Disabled: routing is handled by nginx Ingress manifests in pods/ingress/nginx-routing.
      enabled: false

  worker:
    serviceAccountName: authentik-csi
    initContainers:
      - name: wait-for-postgresql
        image: public.ecr.aws/docker/library/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command:
          - sh
          - -ec
          - |
            until nc -z authentik-postgresql 5432; do
              echo "waiting for authentik-postgresql:5432"
              sleep 2
            done
    env:
      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-encryption
            key: secret_key
      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-postgresql
            key: postgresql_password
    volumeMounts:
      - name: authentik-blueprints
        mountPath: /blueprints/cluster
        readOnly: true
      - name: authentik-openbao
        mountPath: /run/openbao
        readOnly: true
    volumes:
      - name: authentik-blueprints
        configMap:
          name: authentik-blueprints
      - name: authentik-openbao
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: authentik-openbao

  postgresql:
    enabled: true
    auth:
      existingSecret: authentik-postgresql
destination_namespace: authentik
