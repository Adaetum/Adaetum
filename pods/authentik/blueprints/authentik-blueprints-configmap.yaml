          slug: cluster-argocd-public
        attrs:
          name: Cluster Argo CD (Public)
          slug: cluster-argocd-public
          provider: !KeyOf argocd-public-provider
          meta_launch_url: https://argocd.mudazukai.cloud
          meta_description: Cluster Argo CD access
