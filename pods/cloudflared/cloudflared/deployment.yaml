apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      serviceAccountName: cloudflared
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: IfNotPresent
          args: ["tunnel", "--no-autoupdate", "run"]
          env:
            # This delivery Secret is created by cloudflared-openbao's CSI
            # mount, never by ESO or a bootstrap writer.
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel
                  key: token
          volumeMounts:
            - name: cloudflared-openbao
              mountPath: /run/openbao
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
        - name: cloudflared-openbao
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: cloudflared-openbao
