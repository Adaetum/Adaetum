apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel
  namespace: cloudflared
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cloudflared-tunnel
    # Bootstrap may already have created this Secret before OpenBao exists.
    # Orphan lets the controller adopt/update that delivery copy without
    # deleting a working credential if this ExternalSecret is unavailable.
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: apps/cloudflared/tunnel
        property: token
