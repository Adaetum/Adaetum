apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-audit
  namespace: compliance
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-audit-reader
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-audit-reader
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: argocd-audit
    namespace: compliance
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-audit-reader
