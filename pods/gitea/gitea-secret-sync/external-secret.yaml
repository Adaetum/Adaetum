apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-admin-secret
  namespace: gitea
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitea-admin-secret
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: apps/gitea/admin
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-encryption
  namespace: gitea
spec:
  # Gitea encrypts persisted values such as 2FA secrets with this key. An
  # operator must migrate those values before deliberately promoting a new
  # version; an ordinary KV edit must never make existing data unreadable.
  refreshPolicy: OnChange
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitea-encryption
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: secret_key
      remoteRef:
        key: apps/gitea/encryption
        property: secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-runtime
  namespace: gitea
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitea-runtime
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: apps/gitea/runtime
