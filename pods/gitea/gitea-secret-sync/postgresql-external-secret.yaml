apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-postgresql-desired
  namespace: gitea
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    # Keep desired state separate from the active chart Secret. The rotation
    # job changes PostgreSQL first, then promotes these values atomically.
    name: gitea-postgresql-desired
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: apps/gitea/postgresql
