apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: ingress
  labels:
    app: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.21.0@sha256:f53faaf71cb270d1ca9dce6ea0c94bfebf1a18696263487f0fbc74b9bf2bd7ff
          imagePullPolicy: IfNotPresent
          env:
            - name: EXTERNAL_DNS_DOMAIN_FILTER
              value: mudazukai.cloud
            # This delivery Secret is created by external-dns-openbao's CSI
            # mount, never by ESO or a bootstrap writer.
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: external-dns-cloudflare
                  key: api-token
          args:
            - --log-level=info
            - --source=service
            - --source=ingress
            - --provider=cloudflare
            - --policy=sync
            - --registry=txt
            - --txt-owner-id=external-dns-ingress
            - --domain-filter=$(EXTERNAL_DNS_DOMAIN_FILTER)
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: external-dns-openbao
              mountPath: /run/openbao
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: external-dns-openbao
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: external-dns-openbao
