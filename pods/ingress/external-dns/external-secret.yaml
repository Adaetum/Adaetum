apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-cloudflare
  namespace: ingress
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: external-dns-cloudflare
    # Bootstrap may already have created this Secret before OpenBao exists.
    # Orphan lets the controller adopt/update that delivery copy without
    # deleting a working credential if this ExternalSecret is unavailable.
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: api-token
      remoteRef:
        key: apps/ingress/external-dns
        property: api_token
