apiVersion: v1
kind: Secret
metadata:
  name: ingress-vip-config
  namespace: ingress
type: Opaque
stringData:
  # The ingress "front door" Service to manage. This is the authoritative and
  # only supported external front door for VIP and DNS ownership.
  ingress_controller_service: kube-system/rke2-ingress-nginx-controller

  # Service type override (optional): defaults to LoadBalancer. Set to NodePort
  # if you explicitly do not want a VIP-managed front door.
  ingress_service_type: LoadBalancer

  # DHCP hostname (optional): used when requesting the VIP via DHCP.
  # ingress_dhcp_hostname: adaetum-ingress

  # VIP override (optional): set ingress_internal_vip / ingress_external_vip to
  # pin a specific address. If left empty, kube-vip will request an address from
  # your DHCP server and then this controller will persist it back into this Secret.
  ingress_internal_vip: ""
  ingress_external_vip: ""
