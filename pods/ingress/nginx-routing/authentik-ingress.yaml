apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik-ui
  namespace: authentik
  annotations:
    external-dns.alpha.kubernetes.io/hostname: authentik.adaetum.invalid
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: authentik.adaetum.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
    - host: authentik.adaetum.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
