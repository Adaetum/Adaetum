apiVersion: apps/v1
kind: Deployment
metadata:
  name: apprise
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apprise
  template:
    metadata:
      labels:
        app: apprise
    spec:
      serviceAccountName: apprise
      initContainers:
        - name: seed-config
          image: public.ecr.aws/docker/library/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              cp /seed/apprise.yml /config/apprise.yml
          volumeMounts:
            - name: apprise-openbao
              mountPath: /seed
              readOnly: true
            - name: apprise-config
              mountPath: /config
      containers:
        - name: apprise
          image: caronc/apprise:1.5.1@sha256:1871ed736799f6320d5061b72a60507f62c8747026e830175dc4b9f8adbf78dd
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: APPRISE_STATEFUL_MODE
              value: simple
            - name: APPRISE_WORKER_COUNT
              value: "1"
          ports:
            - containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: apprise-config
              mountPath: /config
            - name: apprise-attach
              mountPath: /attach
            - name: apprise-plugin
              mountPath: /plugin
            - name: apprise-tmp
              mountPath: /tmp
      volumes:
        - name: apprise-config
          emptyDir: {}
        - name: apprise-openbao
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: apprise-openbao
        - name: apprise-attach
          emptyDir: {}
        - name: apprise-plugin
          emptyDir: {}
        - name: apprise-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: apprise
  namespace: observability
spec:
  selector:
    app: apprise
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
