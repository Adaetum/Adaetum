apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: observability
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: grafana-openbao
  namespace: observability
spec:
  provider: openbao
  parameters:
    roleName: grafana
    objects: |
      - objectName: admin-user
        secretPath: secret/data/apps/observability/grafana
        secretKey: admin_user
      - objectName: admin-password
        secretPath: secret/data/apps/observability/grafana
        secretKey: admin_password
      - objectName: secret-key
        secretPath: secret/data/apps/observability/grafana
        secretKey: secret_key
