apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: admin-user
      remoteRef:
        key: apps/observability/grafana
        property: admin_user
    - secretKey: admin-password
      remoteRef:
        key: apps/observability/grafana
        property: admin_password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-encryption
  namespace: observability
spec:
  # Grafana's secret_key is the KEK for secrets persisted in its database.
  # Promote a replacement only after Grafana re-encrypts its data keys.
  refreshPolicy: OnChange
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-encryption
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: GF_SECURITY_SECRET_KEY
      remoteRef:
        key: apps/observability/grafana
        property: secret_key
