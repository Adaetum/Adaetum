- GitOps and Source of Truth:
    - Argo CD (internal):
        icon: si-argo
        href: https://__ARGOCD_LOCAL_HOST__/
        description: GitOps control plane on LAN or VPN
        siteMonitor: http://argocd-server.argocd.svc.cluster.local/healthz
        widget:
          type: argocd
          url: http://argocd-server.argocd.svc.cluster.local
          key: __HOMEPAGE_ARGOCD_WIDGET_KEY__
          fields:
            - apps
            - synced
            - outOfSync
            - healthy
    - Argo CD (public):
        icon: si-argo
        href: https://__ARGOCD_PUBLIC_HOST__/
        description: Public route for off-network access
        siteMonitor: http://argocd-server.argocd.svc.cluster.local/healthz
    - Gitea (internal):
        icon: gitea.png
        href: https://__GITEA_LOCAL_HOST__/
        description: Source control and registry frontend on LAN or VPN
        siteMonitor: http://gitea-http.gitea.svc.cluster.local:3000/api/healthz
        widget:
          type: gitea
          url: http://gitea-http.gitea.svc.cluster.local:3000
          key: __HOMEPAGE_GITEA_WIDGET_AUTH__
          fields:
            - repositories
            - notifications
            - issues
            - pulls
    - Gitea (public):
        icon: gitea.png
        href: https://__GITEA_PUBLIC_HOST__/
        description: Public route for source control
        siteMonitor: http://gitea-http.gitea.svc.cluster.local:3000/api/healthz
