- Observability, Portal, and Automation:
    - Alertmanager (internal):
        icon: si-prometheus
        href: https://__ALERTMANAGER_LOCAL_HOST__/
        description: Alert routing UI on LAN or VPN
        siteMonitor: http://alertmanager.observability.svc.cluster.local:9093/-/healthy
    - Alertmanager (public):
        icon: si-prometheus
        href: https://__ALERTMANAGER_PUBLIC_HOST__/
        description: Public alerting route
        siteMonitor: http://alertmanager.observability.svc.cluster.local:9093/-/healthy
    - Grafana (internal):
        icon: grafana.png
        href: https://__GRAFANA_LOCAL_HOST__/
        description: Dashboards and visualization on LAN or VPN
        siteMonitor: http://grafana.observability.svc.cluster.local/api/health
        widget:
          type: grafana
          version: 2
          alerts: grafana
          url: http://grafana.observability.svc.cluster.local
          username: __HOMEPAGE_GRAFANA_USERNAME__
          password: __HOMEPAGE_GRAFANA_PASSWORD__
          fields:
            - dashboards
            - datasources
            - totalalerts
            - alertstriggered
    - Grafana (public):
        icon: grafana.png
        href: https://__GRAFANA_PUBLIC_HOST__/
        description: Public dashboards route
        siteMonitor: http://grafana.observability.svc.cluster.local/api/health
    - Prometheus (internal):
        icon: si-prometheus
        href: https://__PROMETHEUS_LOCAL_HOST__/
        description: Metrics query and target UI on LAN or VPN
        siteMonitor: http://prometheus-operated.observability.svc.cluster.local:9090/-/healthy
        widget:
          type: prometheus
          url: http://prometheus-operated.observability.svc.cluster.local:9090
          fields:
            - targets_up
            - targets_down
            - targets_total
    - Prometheus (public):
        icon: si-prometheus
        href: https://__PROMETHEUS_PUBLIC_HOST__/
        description: Public Prometheus route
        siteMonitor: http://prometheus-operated.observability.svc.cluster.local:9090/-/healthy
