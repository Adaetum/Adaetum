- Cluster Operations:
    - Rancher:
        icon: rancher.png
        href: https://__RANCHER_PUBLIC_HOST__/
        description: Cluster lifecycle and workload management
        siteMonitor: http://rancher.cattle-system.svc.cluster.local/healthz
    - Headlamp:
        icon: mdi-kubernetes
        href: https://__HEADLAMP_PUBLIC_HOST__/
        description: Kubernetes resources, workloads, and security posture
        siteMonitor: http://headlamp.headlamp.svc.cluster.local/
- GitOps and Source:
    - Argo CD:
        icon: si-argo
        href: https://__ARGOCD_PUBLIC_HOST__/
        description: Desired state, synchronization, and application health
        siteMonitor: http://argocd-server.argocd.svc.cluster.local/healthz
        widget:
          type: argocd
          url: http://argocd-server.argocd.svc.cluster.local
          key: __HOMEPAGE_ARGOCD_WIDGET_KEY__
          fields:
            - apps
            - synced
            - outOfSync
            - healthy
    - Gitea:
        icon: gitea.png
        href: https://__GITEA_PUBLIC_HOST__/
        description: Recovery repository, source control, and automation
        siteMonitor: http://gitea-http.gitea.svc.cluster.local:3000/api/healthz
        widget:
          type: gitea
          url: http://gitea-http.gitea.svc.cluster.local:3000
          key: __HOMEPAGE_GITEA_WIDGET_AUTH__
          fields:
            - repositories
            - notifications
            - issues
            - pulls
- Secrets and Identity:
    - OpenBao:
        icon: si-vault
        href: https://__OPENBAO_PUBLIC_HOST__/ui/
        description: Secrets, credentials, and rotation authority
        siteMonitor: http://openbao.openbao.svc.cluster.local:8200/v1/sys/health
    - Authentik:
        icon: authentik.png
        href: https://__AUTHENTIK_PUBLIC_HOST__/
        description: Identity provider and access control
        siteMonitor: http://authentik-server.authentik.svc.cluster.local/-/health/live/
- Metrics and Alerts:
    - Grafana:
        icon: grafana.png
        href: https://__GRAFANA_PUBLIC_HOST__/
        description: Dashboards, visualization, and alert exploration
        siteMonitor: http://grafana.observability.svc.cluster.local/api/health
        widget:
          type: grafana
          version: 2
          alerts: grafana
          url: http://grafana.observability.svc.cluster.local
          username: __HOMEPAGE_GRAFANA_USERNAME__
          password: __HOMEPAGE_GRAFANA_PASSWORD__
          fields:
            - dashboards
            - datasources
            - totalalerts
            - alertstriggered
    - Prometheus:
        icon: si-prometheus
        href: https://__PROMETHEUS_PUBLIC_HOST__/
        description: Metrics queries, scrape targets, and service health
        siteMonitor: http://prometheus-operated.observability.svc.cluster.local:9090/-/healthy
        widget:
          type: prometheus
          url: http://prometheus-operated.observability.svc.cluster.local:9090
          fields:
            - targets_up
            - targets_down
            - targets_total
    - Alertmanager:
        icon: si-prometheus
        href: https://__ALERTMANAGER_PUBLIC_HOST__/
        description: Alert routing, silences, and active notifications
        siteMonitor: http://alertmanager.observability.svc.cluster.local:9093/-/healthy
- Network and Delivery:
    - Container Registry:
        icon: mdi-docker
        href: https://__REGISTRY_PUBLIC_HOST__/
        description: Private images served by the recovery Gitea registry
        siteMonitor: http://gitea-http.gitea.svc.cluster.local:3000/api/healthz
    - Cloudflare:
        icon: cloudflare.png
        href: https://dash.cloudflare.com/
        description: Public DNS, tunnels, and edge controls
    - Tailscale:
        icon: tailscale.png
        href: https://login.tailscale.com/admin/machines
        description: Tailnet devices and private network access
    - Adaetum on GitHub:
        icon: github.png
        href: https://github.com/Adaetum/Adaetum
        description: Upstream project, releases, and documentation
