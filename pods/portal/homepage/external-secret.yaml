apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-widget-secrets
  namespace: homepage
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: homepage-widget-secrets
    # Late bootstrap may create the initial delivery copy while minting the
    # app-issued tokens. Keep it present if reconciliation is unavailable.
    creationPolicy: Orphan
    deletionPolicy: Retain
  # List only fields rendered by Homepage. Provider bootstrap credentials must
  # never hitchhike into this Secret merely because they share an OpenBao path.
  data:
    - secretKey: HOMEPAGE_ARGOCD_WIDGET_KEY
      remoteRef:
        key: apps/homepage/widgets
        property: HOMEPAGE_ARGOCD_WIDGET_KEY
    - secretKey: HOMEPAGE_GITEA_WIDGET_AUTH
      remoteRef:
        key: apps/homepage/widgets
        property: HOMEPAGE_GITEA_WIDGET_AUTH
