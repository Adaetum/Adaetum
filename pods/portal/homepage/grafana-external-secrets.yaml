# Seed Homepage's active delivery copy once. Subsequent OpenBao changes are
# promoted by grafana-viewer-rotation only after Grafana accepts the new
# credential, preventing ESO from breaking the widget mid-rotation.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-grafana-active
  namespace: homepage
spec:
  refreshPolicy: CreatedOnce
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: homepage-grafana
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: HOMEPAGE_GRAFANA_USERNAME
      remoteRef:
        key: apps/homepage/grafana
        property: username
    - secretKey: HOMEPAGE_GRAFANA_PASSWORD
      remoteRef:
        key: apps/homepage/grafana
        property: password
