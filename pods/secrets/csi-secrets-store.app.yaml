name: csi-secrets-store
project: default
annotations:
  # The driver CRDs and node plugin must exist before any post-OpenBao app can
  # create a SecretProviderClass or request a mounted secret.
  argocd.argoproj.io/sync-wave: "-18"
source_type: helm
source_repo_url: https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
source_chart: secrets-store-csi-driver
source_target_revision: "1.6.0"
source_helm_values: |
  linux:
    # Keep the driver and OpenBao provider on the same RKE2-writable socket
    # directory; /etc/kubernetes remains only the chart's compatibility path.
    providersDir: /var/run/secrets-store-csi-providers
  syncSecret:
    # File-native workloads use only mounted files. Chart-managed workloads
    # that cannot accept files use this CSI-owned, pod-lifecycle delivery copy
    # instead of an ESO-polled application Secret.
    enabled: true
  enableSecretRotation: true
destination_namespace: kube-system
