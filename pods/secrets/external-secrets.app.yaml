name: external-secrets
project: default
annotations:
  argocd.argoproj.io/sync-wave: "-16"
source_type: helm
source_repo_url: https://charts.external-secrets.io
source_chart: external-secrets
source_target_revision: "2.8.0"
sync_options:
  # ESO's largest CRDs exceed the client-side apply annotation limit. Keep
  # ownership in this Application while letting the API server merge fields.
  - ServerSideApply=true
source_helm_values: |
  installCRDs: true
destination_namespace: external-secrets
