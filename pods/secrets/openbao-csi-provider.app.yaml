name: openbao-csi-provider
project: default
annotations:
  argocd.argoproj.io/sync-wave: "-17"
source_type: helm
source_repo_url: https://openbao.github.io/openbao-helm
source_chart: openbao
source_target_revision: "0.27.1"
source_helm_values: |
  global:
    externalBaoAddr: http://openbao.openbao.svc.cluster.local:8200
  server:
    enabled: false
  injector:
    enabled: false
  csi:
    enabled: true
destination_namespace: kube-system
