name: openbao-csi-provider
project: default
annotations:
  argocd.argoproj.io/sync-wave: "-17"
source_type: helm
source_repo_url: https://openbao.github.io/openbao-helm
source_chart: openbao
source_target_revision: "0.27.1"
source_helm_values: |
  global:
    externalBaoAddr: http://openbao.openbao.svc.cluster.local:8200
  server:
    enabled: false
  injector:
    enabled: false
  csi:
    enabled: true
    image:
      # Chart 0.27.1 defaults to the initial v2.0.0 provider release. Pin the
      # provider independently so it stays compatible with the separately
      # managed Secrets Store CSI driver (currently 1.6.0).
      tag: "2.0.2"
destination_namespace: kube-system
