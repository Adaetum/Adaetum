name: openbao-csi-provider
project: default
annotations:
  argocd.argoproj.io/sync-wave: "-17"
source_type: helm
source_repo_url: https://openbao.github.io/openbao-helm
source_chart: openbao
source_target_revision: "0.27.1"
source_helm_values: |
  global:
    externalBaoAddr: http://openbao.openbao.svc.cluster.local:8200
  server:
    enabled: false
  injector:
    enabled: false
  csi:
    enabled: true
    daemonSet:
      # Match the CSI driver's primary provider directory. The OpenBao chart's
      # /etc/kubernetes default is only an additional compatibility path and
      # was not writable on the hardened Rocky host.
      providersDir: /var/run/secrets-store-csi-providers
      securityContext:
        container:
          # Providers create a registration socket in this shared hostPath and
          # therefore must run as root, per the CSI provider contract.
          runAsUser: 0
          runAsNonRoot: false
destination_namespace: kube-system
