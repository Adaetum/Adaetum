apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-bootstrap-config
  namespace: openbao
  annotations:
    # Policies and auth roles are idempotent desired state. Recreate the Job
    # when that configuration changes instead of leaving an immutable,
    # completed Job blocking the update.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: openbao
      restartPolicy: OnFailure
      containers:
        - name: openbao-config
          image: ghcr.io/openbao/openbao:latest
          env:
            - name: OPENBAO_ADDR
              value: "http://openbao.openbao.svc.cluster.local:8200"
            - name: VAULT_ADDR
              value: "http://openbao.openbao.svc.cluster.local:8200"
            - name: BAO_ADDR
              value: "http://openbao.openbao.svc.cluster.local:8200"
            - name: OPENBAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbao-bootstrap-token
                  key: token
                  optional: true
          command:
            - /bin/sh
            - -c
            - |
              set -e

              if [ -z "${OPENBAO_TOKEN:-}" ]; then
                OPENBAO_TOKEN="$(bao write -field=token auth/kubernetes/login \
                  role=openbao-config \
                  jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)")"
                export OPENBAO_TOKEN BAO_TOKEN
              fi
              bao login "$OPENBAO_TOKEN" >/dev/null

              bao auth enable kubernetes || true

              # OpenBao runs in Kubernetes, so it can periodically re-read its
              # projected service-account token. Persisting today's reviewer
              # JWT here would break authentication after that token rotates.
              bao write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc"

              bao policy write argo /policies/argo.hcl
              bao policy write ci /policies/ci.hcl
              bao policy write openbao-config /policies/config.hcl
              bao policy write external-secrets /policies/external-secrets.hcl
              bao policy write apprise /policies/apprise.hcl
              bao policy write cloudflared /policies/cloudflared.hcl
              bao policy write external-dns /policies/external-dns.hcl
              bao policy write ansible-runner /policies/ansible-runner.hcl
              bao policy write homepage /policies/homepage.hcl
              bao policy write grafana /policies/grafana.hcl
              bao policy write authentik /policies/authentik.hcl
              bao policy write gitea /policies/gitea.hcl

              bao write auth/kubernetes/role/argo \
                bound_service_account_names=argocd-server \
                bound_service_account_namespaces=argocd \
                policies=argo \
                ttl=1h

              bao write auth/kubernetes/role/ci \
                bound_service_account_names=gitea-runner \
                bound_service_account_namespaces=gitea \
                policies=ci \
                ttl=1h

              bao write auth/kubernetes/role/external-secrets \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=external-secrets \
                audience=openbao \
                token_policies=external-secrets \
                ttl=1h

              # CSI authenticates as the workload pod. Keep each role bound
              # to its own service account and its matching one-path policy.
              bao write auth/kubernetes/role/apprise \
                bound_service_account_names=apprise \
                bound_service_account_namespaces=observability \
                token_policies=apprise ttl=1h
              bao write auth/kubernetes/role/cloudflared \
                bound_service_account_names=cloudflared \
                bound_service_account_namespaces=cloudflared \
                token_policies=cloudflared ttl=1h
              bao write auth/kubernetes/role/external-dns \
                bound_service_account_names=external-dns \
                bound_service_account_namespaces=ingress \
                token_policies=external-dns ttl=1h
              bao write auth/kubernetes/role/ansible-runner \
                bound_service_account_names=ansible-runner \
                bound_service_account_namespaces=ansible \
                token_policies=ansible-runner ttl=1h
              bao write auth/kubernetes/role/homepage \
                bound_service_account_names=homepage \
                bound_service_account_namespaces=homepage \
                token_policies=homepage ttl=1h
              bao write auth/kubernetes/role/grafana \
                bound_service_account_names=grafana \
                bound_service_account_namespaces=observability \
                token_policies=grafana ttl=1h
              bao write auth/kubernetes/role/authentik \
                bound_service_account_names=authentik-csi \
                bound_service_account_namespaces=authentik \
                token_policies=authentik ttl=1h
              bao write auth/kubernetes/role/gitea \
                bound_service_account_names=gitea-csi \
                bound_service_account_namespaces=gitea \
                token_policies=gitea ttl=1h

              bao write auth/kubernetes/role/openbao-config \
                bound_service_account_names=openbao \
                bound_service_account_namespaces=openbao \
                token_policies=openbao-config \
                ttl=15m
          volumeMounts:
            - name: policies
              mountPath: /policies
              readOnly: true
      volumes:
        - name: policies
          configMap:
            name: openbao-policies
