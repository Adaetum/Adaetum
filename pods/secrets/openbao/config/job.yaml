apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-bootstrap-config
  namespace: openbao
  annotations:
    # Policies and auth roles are idempotent desired state. Recreate the Job
    # when that configuration changes instead of leaving an immutable,
    # completed Job blocking the update.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: openbao
      restartPolicy: OnFailure
      containers:
        - name: openbao-config
          image: ghcr.io/openbao/openbao:latest
          env:
            - name: OPENBAO_ADDR
              value: "http://openbao.openbao.svc.cluster.local:8200"
            - name: VAULT_ADDR
              value: "http://openbao.openbao.svc.cluster.local:8200"
            - name: BAO_ADDR
              value: "http://openbao.openbao.svc.cluster.local:8200"
            - name: OPENBAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbao-bootstrap-token
                  key: token
                  optional: true
          command:
            - /bin/sh
            - -c
            - |
              set -e

              if [ -z "${OPENBAO_TOKEN:-}" ]; then
                OPENBAO_TOKEN="$(bao write -field=token auth/kubernetes/login \
                  role=openbao-config \
                  jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)")"
                export OPENBAO_TOKEN BAO_TOKEN
              fi
              bao login "$OPENBAO_TOKEN" >/dev/null

              bao auth enable kubernetes || true

              # OpenBao runs in Kubernetes, so it can periodically re-read its
              # projected service-account token. Persisting today's reviewer
              # JWT here would break authentication after that token rotates.
              bao write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc"

              bao policy write argo /policies/argo.hcl
              bao policy write ci /policies/ci.hcl
              bao policy write openbao-config /policies/config.hcl
              bao policy write external-secrets /policies/external-secrets.hcl

              bao write auth/kubernetes/role/argo \
                bound_service_account_names=argocd-server \
                bound_service_account_namespaces=argocd \
                policies=argo \
                ttl=1h

              bao write auth/kubernetes/role/ci \
                bound_service_account_names=gitea-runner \
                bound_service_account_namespaces=gitea \
                policies=ci \
                ttl=1h

              bao write auth/kubernetes/role/external-secrets \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=external-secrets \
                audience=openbao \
                token_policies=external-secrets \
                ttl=1h

              bao write auth/kubernetes/role/openbao-config \
                bound_service_account_names=openbao \
                bound_service_account_namespaces=openbao \
                token_policies=openbao-config \
                ttl=15m
          volumeMounts:
            - name: policies
              mountPath: /policies
              readOnly: true
      volumes:
        - name: policies
          configMap:
            name: openbao-policies
