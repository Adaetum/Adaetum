apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-config
  namespace: openbao
data:
  openbao.hcl: |
    ui = true
    listener "tcp" {
      address = "0.0.0.0:8200"
      tls_disable = 1
    }
    storage "raft" {
      path = "/openbao/data"
      node_id = "openbao-0"
    }
    api_addr = "http://openbao-0.openbao-internal.openbao.svc.cluster.local:8200"
    cluster_addr = "http://openbao-0.openbao-internal.openbao.svc.cluster.local:8201"
