apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rancher-admin-desired
  namespace: cattle-system
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    # Rancher's bootstrap Secret is not a password-reset interface. Keep the
    # OpenBao value isolated until PasswordChangeRequest succeeds.
    name: rancher-admin-desired
    creationPolicy: Orphan
    deletionPolicy: Retain
  data:
    - secretKey: password
      remoteRef:
        key: apps/rancher/admin
        property: bootstrap_password
