apiVersion: v1
kind: ServiceAccount
metadata:
  name: rancher-admin-rotation
  namespace: cattle-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rancher-admin-rotation
  namespace: cattle-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["bootstrap-secret"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rancher-admin-rotation
  namespace: cattle-system
subjects:
  - kind: ServiceAccount
    name: rancher-admin-rotation
    namespace: cattle-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rancher-admin-rotation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rancher-admin-rotation
rules:
  - apiGroups: ["management.cattle.io"]
    resources: ["users"]
    verbs: ["get", "list"]
  - apiGroups: ["ext.cattle.io"]
    resources: ["passwordchangerequests"]
    verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rancher-admin-rotation
subjects:
  - kind: ServiceAccount
    name: rancher-admin-rotation
    namespace: cattle-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rancher-admin-rotation
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rancher-admin-rotation
  namespace: cattle-system
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 600
      template:
        spec:
          serviceAccountName: rancher-admin-rotation
          restartPolicy: Never
          containers:
            - name: reconcile-password
              image: registry.k8s.io/kubectl:v1.35.6@sha256:4d8c68e8c2bf360b1808927c4d39fb13998c106cac903622d127a2275c844126
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "-ec"]
              args:
                - |
                  if cmp -s /var/run/active/password /var/run/desired/password; then
                    echo "Rancher administrator already matches OpenBao."
                    exit 0
                  fi

                  login_with_password() {
                    local password_file="${1:?password file is required}"
                    local payload=""
                    payload="$(
                      jq -n --rawfile password "${password_file}" \
                        '{username: "admin", password: $password, responseType: "json"}'
                    )"
                    curl --silent --show-error --insecure --fail \
                      --output /dev/null \
                      --header 'Content-Type: application/json' \
                      --data "${payload}" \
                      'https://rancher.cattle-system.svc/v3-public/localProviders/local?action=login'
                  }

                  promote_delivery_copy() {
                    local payload=""
                    payload="$(
                      jq -n --rawfile password /var/run/desired/password \
                        '{stringData: {bootstrapPassword: $password}}'
                    )"
                    kubectl -n cattle-system patch secret bootstrap-secret --type=merge -p "${payload}"
                  }

                  if login_with_password /var/run/desired/password; then
                    promote_delivery_copy
                    echo "Rancher password was already changed; repaired its delivery copy."
                    exit 0
                  fi
                  if ! login_with_password /var/run/active/password; then
                    echo "Neither the active nor desired OpenBao password authenticates to Rancher." >&2
                    echo "Refusing to overwrite recovery state; repair the Rancher administrator first." >&2
                    exit 1
                  fi

                  user_id="$(
                    kubectl get users.management.cattle.io -o json \
                      | jq -er '[.items[] | select(.username == "admin") | .metadata.name][0] // empty'
                  )"
                  request_payload="$(
                    jq -n \
                      --arg user_id "${user_id}" \
                      --rawfile current_password /var/run/active/password \
                      --rawfile new_password /var/run/desired/password \
                      '{
                        apiVersion: "ext.cattle.io/v1",
                        kind: "PasswordChangeRequest",
                        metadata: {generateName: "adaetum-admin-rotation-"},
                        spec: {
                          userID: $user_id,
                          currentPassword: $current_password,
                          newPassword: $new_password
                        }
                      }'
                  )"
                  request_ref="$(printf '%s' "${request_payload}" | kubectl create -f - -o name)"
                  cleanup_request() {
                    kubectl delete "${request_ref}" --ignore-not-found >/dev/null 2>&1 || true
                  }
                  trap cleanup_request EXIT

                  for _ in $(seq 1 60); do
                    if login_with_password /var/run/desired/password; then
                      promote_delivery_copy
                      echo "Rancher administrator reconciled from OpenBao."
                      exit 0
                    fi
                    sleep 5
                  done
                  echo "Rancher did not accept the desired password after PasswordChangeRequest." >&2
                  exit 1
              volumeMounts:
                - name: active-password
                  mountPath: /var/run/active
                  readOnly: true
                - name: desired-password
                  mountPath: /var/run/desired
                  readOnly: true
          volumes:
            - name: active-password
              secret:
                secretName: bootstrap-secret
                items:
                  - key: bootstrapPassword
                    path: password
            - name: desired-password
              secret:
                secretName: rancher-admin-desired
                items:
                  - key: password
                    path: password
