version: "3"

tasks:
  init:
    internal: true
    desc: Guided first-run setup that prepares provider accounts before collecting secrets
    cmds:
      - cmd: bash ./tasks/scripts/run-first-run-wizard.sh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/run-first-run-wizard.sh
        platforms: [windows]

  init:dryrun:
    internal: true
    desc: Read-only first-run walkthrough with simulated provider actions
    env:
      ADAETUM_INIT_DRY_RUN: "1"
    cmds:
      - cmd: bash ./tasks/scripts/run-first-run-wizard.sh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/run-first-run-wizard.sh
        platforms: [windows]

  initialize:
    internal: true
    desc: Opinionated full setup (prompts for runtime credentials; public settings come from platform.yaml)
    deps: [install:prerequisites]
    cmds:
      - cmd: bash ./tasks/scripts/run-opinionated-setup.sh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/run-opinionated-setup.sh
        platforms: [windows]

  validate:runtime:
    internal: true
    desc: Build and validate the local bootstrap runtime env without reinstalling
    deps: [install:prerequisites]
    cmds:
      - cmd: bash ./tasks/scripts/validate-bootstrap-runtime-env.sh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/validate-bootstrap-runtime-env.sh
        platforms: [windows]

  install:prerequisites:
    internal: true
    desc: Ensure python3 exists and uv/rclone/7z are installed (auto-install best effort)
    cmds:
      - cmd: |
          set -euo pipefail
          if ! command -v python3 >/dev/null 2>&1; then
            echo "python3 is required for setup tasks. Install python3, then re-run." >&2
            exit 1
          fi
          if ! python3 -c 'import yaml' >/dev/null 2>&1; then
            echo "PyYAML is required for platform.yaml. Install it with: python3 -m pip install pyyaml" >&2
            exit 1
          fi
          if ! command -v rclone >/dev/null 2>&1; then
            echo "rclone not found. Attempting best-effort install..."
            if command -v brew >/dev/null 2>&1; then
              brew install rclone || true
            elif command -v apt-get >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y rclone || true
            elif command -v dnf >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo dnf install -y rclone || true
            elif command -v yum >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo yum install -y rclone || true
            elif command -v pacman >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo pacman -Sy --noconfirm rclone || true
            elif command -v zypper >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo zypper --non-interactive install rclone || true
            fi
          fi
          if ! command -v rclone >/dev/null 2>&1; then
            echo "rclone is required for setup tasks. Auto-install failed; install manually: https://rclone.org/install/" >&2
            exit 1
          fi
          if ! command -v 7z >/dev/null 2>&1 && ! command -v 7za >/dev/null 2>&1 && ! command -v 7zz >/dev/null 2>&1; then
            echo "7z not found. Attempting best-effort install..."
            if command -v brew >/dev/null 2>&1; then
              brew install sevenzip || true
            elif command -v apt-get >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y p7zip-full || true
            elif command -v dnf >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo dnf install -y p7zip p7zip-plugins || true
            elif command -v yum >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo yum install -y p7zip p7zip-plugins || true
            elif command -v pacman >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo pacman -Sy --noconfirm p7zip || true
            elif command -v zypper >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
              sudo zypper --non-interactive install 7zip || true
            fi
          fi
          if ! command -v 7z >/dev/null 2>&1 && ! command -v 7za >/dev/null 2>&1 && ! command -v 7zz >/dev/null 2>&1; then
            echo "A 7-Zip command (7z, 7za, or 7zz) is required for recovery workflows. Auto-install failed; install manually: https://www.7-zip.org/" >&2
            exit 1
          fi
          if ! command -v uv >/dev/null 2>&1 && [ -x "${HOME}/.local/bin/uv" ]; then
            export PATH="${HOME}/.local/bin:${PATH}"
          fi
          if command -v uv >/dev/null 2>&1; then
            exit 0
          fi
          if ! command -v curl >/dev/null 2>&1; then
            echo "uv is missing and curl is not available for auto-install." >&2
            echo "Install uv manually: https://docs.astral.sh/uv/getting-started/installation/" >&2
            exit 1
          fi
          echo "uv not found. Installing via astral installer..."
          curl -LsSf https://astral.sh/uv/install.sh | sh
          if command -v uv >/dev/null 2>&1; then
            echo "uv installed: $(command -v uv)"
            exit 0
          fi
          if [ -x "${HOME}/.local/bin/uv" ]; then
            echo "uv installed at ${HOME}/.local/bin/uv (not currently on PATH)."
            exit 0
          fi
          echo "uv install did not produce a runnable binary on PATH." >&2
          exit 1
        platforms: [linux, darwin]
      - cmd: |
          powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/install-uv.ps1
        platforms: [windows]
      - cmd: |
          powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/install-rclone.ps1
        platforms: [windows]
      - cmd: |
          powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/install-7zip.ps1
        platforms: [windows]

  install:gum:
    internal: true
    desc: Install Gum for the guided first-run walkthrough
    cmds:
      - cmd: |
          set -euo pipefail
          if command -v gum >/dev/null 2>&1; then
            exit 0
          fi
          echo "Gum is required for task init. Attempting installation from the system package manager..."
          if command -v brew >/dev/null 2>&1; then
            brew install gum
          elif command -v dnf >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
            sudo dnf install -y gum
          elif command -v pacman >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
            sudo pacman -Sy --noconfirm gum
          else
            echo "Could not install Gum automatically for this operating system." >&2
            echo "Install it from https://github.com/charmbracelet/gum#installation, then rerun task init." >&2
            exit 1
          fi
          if ! command -v gum >/dev/null 2>&1; then
            echo "Gum installation completed without a runnable gum command. Open a new shell and rerun task init." >&2
            exit 1
          fi
        platforms: [linux, darwin]
      - cmd: |
          powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/install-gum.ps1
        platforms: [windows]

  install:github-cli:
    internal: true
    desc: Install GitHub CLI for the guided fork creation step
    cmds:
      - cmd: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            exit 0
          fi
          echo "GitHub CLI is required for task init to create your fork. Attempting installation from the system package manager..."
          if command -v brew >/dev/null 2>&1; then
            brew install gh
          elif command -v dnf >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
            sudo dnf install -y gh
          elif command -v pacman >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
            sudo pacman -Sy --noconfirm github-cli
          else
            echo "Could not install GitHub CLI automatically for this operating system." >&2
            echo "Install it from https://cli.github.com/, then rerun task init." >&2
            exit 1
          fi
          if ! command -v gh >/dev/null 2>&1; then
            echo "GitHub CLI installation completed without a runnable gh command. Open a new shell and rerun task init." >&2
            exit 1
          fi
        platforms: [linux, darwin]
      - cmd: |
          powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/install-github-cli.ps1
        platforms: [windows]

  generate:
    internal: true
    desc: Interactive setup wizard to build .env (optionally syncs GitHub secrets)
    deps: [install:prerequisites]
    cmds:
      - cmd: ./tasks/scripts/generate-env-files.sh .env .env
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/generate-env-files.sh .env .env
        platforms: [windows]

  generate:noninteractive:
    internal: true
    desc: Rebuild .env from existing values/defaults without prompts
    deps: [install:prerequisites]
    env:
      NON_INTERACTIVE: "1"
    cmds:
      - cmd: ./tasks/scripts/generate-env-files.sh .env .env
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/generate-env-files.sh .env .env
        platforms: [windows]

  generate:github-secrets:
    internal: true
    desc: Non-interactive rebuild (.env) + GitHub secret sync (GITHUB_ENVIRONMENT=cluster by default)
    deps: [install:prerequisites]
    env:
      NON_INTERACTIVE: "1"
      GITHUB_SYNC: "1"
      GITHUB_ENVIRONMENT: '{{default "cluster" .GITHUB_ENVIRONMENT}}'
    cmds:
      - cmd: ./tasks/scripts/generate-env-files.sh .env .env
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File ./tasks/scripts/invoke-bash-script.ps1 ./tasks/scripts/generate-env-files.sh .env .env
        platforms: [windows]
