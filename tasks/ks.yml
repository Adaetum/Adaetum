version: "3"

tasks:
  compile:
    desc: Compile generated kickstart files from ks-src into dist/ks-templates
    deps: [':hooks:ensure']
    cmds:
      - |
        set -euo pipefail
        if command -v uv >/dev/null 2>&1; then
          uv run --with jinja2 python ./tasks/scripts/compile-kickstarts.py --sync --self-test
        else
          python3 ./tasks/scripts/compile-kickstarts.py --sync --self-test
        fi

  compile:check:
    desc: Validate ks-src and the kickstart compiler without committed rendered files
    deps: [':hooks:ensure']
    cmds:
      - |
        set -euo pipefail
        if command -v uv >/dev/null 2>&1; then
          uv run --with jinja2 python ./tasks/scripts/compile-kickstarts.py --validate-all --self-test
        else
          python3 ./tasks/scripts/compile-kickstarts.py --validate-all --self-test
        fi

  render:external:
    desc: External wrapper for kickstart render (used by workflows and scripts)
    deps: [':hooks:ensure']
    cmds:
      - task: render

  render:
    internal: true
    desc: Render kickstart files into dist/ks-templates with only the shared bootstrap token embedded
    deps: [':hooks:ensure', compile]
    preconditions:
      - sh: test -n "{{.KS_TEMPLATE_FILE_NAME}}"
        msg: "Set KS_TEMPLATE_FILE_NAME or LOCAL_KS_TEMPLATE_FILE_NAME (e.g., rocky10.ks) to select the kickstart template."
    cmds:
      - |
        set -e
        ks_env="${KS_ENV:-.env}"
        if [ ! -f "${ks_env}" ]; then
          echo "Missing KS env file: ${ks_env} (copy .env.template or set KS_ENV)"
          exit 1
        fi
        set -a
        . "${ks_env}"
        set +a

        # Cluster DNS suffix used for service UIs (e.g., gitea.<cluster_domain>).
        CLUSTER_DOMAIN="${CLUSTER_DOMAIN:-}"

        task_firstboot_no_poweroff="{{.FIRSTBOOT_NO_POWEROFF}}"
        if [ -n "${task_firstboot_no_poweroff}" ]; then
          FIRSTBOOT_NO_POWEROFF="${task_firstboot_no_poweroff}"
        fi

        # Optional convenience: if MONOREPO_GITHUB_* is set, use it as the default
        # for both Argo CD bootstrap repo settings and kickstart repo fetch settings.
        MONOREPO_GITHUB_REPO_URL="${MONOREPO_GITHUB_REPO_URL:-}"
        MONOREPO_GITHUB_REPO_BRANCH="${MONOREPO_GITHUB_REPO_BRANCH:-master}"
        MONOREPO_GITHUB_USERNAME="${MONOREPO_GITHUB_USERNAME:-}"
        MONOREPO_GITHUB_TOKEN="${MONOREPO_GITHUB_TOKEN:-}"
        GITHUB_SYNC_TOKEN="${GITHUB_SYNC_TOKEN:-}"
        MONOREPO_GITHUB_HOST="${MONOREPO_GITHUB_HOST:-}"
        GITHUB_APP_ID="${GITHUB_APP_ID:-${MONOREPO_GITHUB_APP_ID:-}}"
        GITHUB_APP_INSTALLATION_ID="${GITHUB_APP_INSTALLATION_ID:-${MONOREPO_GITHUB_APP_INSTALLATION_ID:-}}"
        GITHUB_APP_PRIVATE_KEY_B64="${GITHUB_APP_PRIVATE_KEY_B64:-${MONOREPO_GITHUB_APP_PRIVATE_KEY_B64:-}}"
        repo_auth_fallback_token=""
        case "${GITHUB_SYNC_TOKEN:-}" in
          github_pat_*|ghp_*|gho_*|ghu_*|ghs_*) repo_auth_fallback_token="${GITHUB_SYNC_TOKEN}" ;;
        esac
        if [ -z "${repo_auth_fallback_token}" ]; then
          case "${MONOREPO_GITHUB_TOKEN:-}" in
            github_pat_*|ghp_*|gho_*|ghu_*|ghs_*) repo_auth_fallback_token="${MONOREPO_GITHUB_TOKEN}" ;;
          esac
        fi

        ARGOCD_GITHUB_REPO_URL="${ARGOCD_GITHUB_REPO_URL:-${MONOREPO_GITHUB_REPO_URL}}"
        ARGOCD_GITHUB_REPO_BRANCH="${ARGOCD_GITHUB_REPO_BRANCH:-${MONOREPO_GITHUB_REPO_BRANCH}}"
        ARGOCD_GITHUB_USERNAME="${ARGOCD_GITHUB_USERNAME:-${MONOREPO_GITHUB_USERNAME}}"
        if [ -n "${repo_auth_fallback_token}" ]; then
          ARGOCD_GITHUB_TOKEN="${repo_auth_fallback_token}"
        else
          ARGOCD_GITHUB_TOKEN="${ARGOCD_GITHUB_TOKEN:-}"
        fi
        if [ -n "${ARGOCD_GITHUB_TOKEN}" ] && [ -z "${ARGOCD_GITHUB_USERNAME}" ]; then
          ARGOCD_GITHUB_USERNAME="oauth2"
        fi

        ANSIBLE_RUNNER_REPO="${ANSIBLE_RUNNER_REPO:-${MONOREPO_GITHUB_REPO_URL}}"
        ANSIBLE_RUNNER_GIT_HOST="${ANSIBLE_RUNNER_GIT_HOST:-${MONOREPO_GITHUB_HOST}}"
        ANSIBLE_RUNNER_HTTP_TOKEN="${ANSIBLE_RUNNER_HTTP_TOKEN:-${GITHUB_SYNC_TOKEN:-${MONOREPO_GITHUB_TOKEN:-}}}"

        force_local_logs="${KS_FORCE_LOCAL_LOGS:-}"
        if [ "${force_local_logs}" = "1" ] || [ "${force_local_logs}" = "true" ]; then
          ip=""
          if [ -z "${ip}" ] && command -v ipconfig >/dev/null 2>&1; then
            # On macOS with QEMU/UTM, bridge100 is commonly the VM gateway and
            # often the most reliable address for guests to reach the host.
            ip="$(ipconfig getifaddr bridge100 || true)"
            if [ -z "${ip}" ]; then
              ip="$(ipconfig getifaddr en0 || true)"
            fi
            if [ -z "${ip}" ]; then
              ip="$(ipconfig getifaddr en1 || true)"
            fi
          fi
          if [ -z "${ip}" ] && command -v hostname >/dev/null 2>&1; then
            ip="$(hostname -I 2>/dev/null | awk '{print $1}')"
          fi
          if [ -z "${ip}" ] && command -v ip >/dev/null 2>&1; then
            ip="$(ip route get 1.1.1.1 2>/dev/null | awk '{for (i=1;i<=NF;i++) if ($i=="src") {print $(i+1); exit}}')"
          fi
          if [ -n "${ip}" ]; then
            KS_LOG_URL="http://${ip}:8000/logs"
          else
            echo "Warning: KS_FORCE_LOCAL_LOGS is set but unable to detect local IP for KS_LOG_URL"
          fi
        fi
        if [ -z "${KS_LOG_URL:-}" ]; then
          if [ -n "${KS_BASE_URL:-}" ]; then
            KS_LOG_URL="${KS_BASE_URL%/}/logs"
          elif [ -n "${KS_FILE_URL:-}" ]; then
            ks_host="$(
              python3 -c 'import os,urllib.parse; url=os.environ.get("KS_FILE_URL",""); parsed=urllib.parse.urlparse(url); print(f"{parsed.scheme}://{parsed.netloc}") if parsed.scheme and parsed.netloc else None'
            )"
            if [ -n "${ks_host}" ]; then
              KS_LOG_URL="${ks_host}/logs"
            fi
          else
            ip=""
            if [ -z "${ip}" ] && command -v ipconfig >/dev/null 2>&1; then
              ip="$(ipconfig getifaddr bridge100 || true)"
              if [ -z "${ip}" ]; then
                ip="$(ipconfig getifaddr en0 || true)"
              fi
              if [ -z "${ip}" ]; then
                ip="$(ipconfig getifaddr en1 || true)"
              fi
            fi
            if [ -z "${ip}" ] && command -v hostname >/dev/null 2>&1; then
              ip="$(hostname -I 2>/dev/null | awk '{print $1}')"
            fi
            if [ -z "${ip}" ] && command -v ip >/dev/null 2>&1; then
              ip="$(ip route get 1.1.1.1 2>/dev/null | awk '{for (i=1;i<=NF;i++) if ($i=="src") {print $(i+1); exit}}')"
            fi
            if [ -n "${ip}" ]; then
              KS_LOG_URL="http://${ip}:8000/logs"
            else
              echo "Warning: unable to detect local IP for KS_LOG_URL"
            fi
          fi
        fi
        bootstrap_runtime_env_url_rendered="${BOOTSTRAP_RUNTIME_ENV_URL:-}"
        if [ -z "${bootstrap_runtime_env_url_rendered}" ] && [ -n "${KS_BASE_URL:-}" ]; then
          bootstrap_runtime_env_url_rendered="${KS_BASE_URL%/}/iso/firstboot-payload/bootstrap-runtime.env"
        fi
        strip_token_param() {
          python3 -c 'import sys,urllib.parse; value=sys.argv[1] if len(sys.argv) > 1 else ""; parsed=urllib.parse.urlparse(value) if value else None; query=[(k,v) for (k,v) in urllib.parse.parse_qsl(parsed.query, keep_blank_values=True) if k.lower() != "token"] if parsed else []; print(urllib.parse.urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, urllib.parse.urlencode(query), parsed.fragment)) if parsed else "")' "${1:-}"
        }
        KS_LOG_URL="$(strip_token_param "${KS_LOG_URL:-}")"
        bootstrap_runtime_env_url_rendered="$(strip_token_param "${bootstrap_runtime_env_url_rendered:-}")"
        bootstrap_backup_url_rendered="$(strip_token_param "${BOOTSTRAP_BACKUP_URL:-}")"
        bootstrap_bundle_url_rendered="${BOOTSTRAP_BUNDLE_URL:-}"
        bootstrap_bundle_url_rendered="$(printf '%s' "${bootstrap_bundle_url_rendered}" | tr -d '\r\n')"
        bootstrap_runtime_env_url_rendered="$(printf '%s' "${bootstrap_runtime_env_url_rendered}" | tr -d '\r\n')"
        escape_sed_replacement() {
          printf '%s' "${1:-}" | sed -e 's/[&\\#]/\\&/g'
        }
        gitea_seed_source_repo_url_esc="$(escape_sed_replacement "${GITEA_SEED_SOURCE_REPO_URL:-${ARGOCD_GITHUB_REPO_URL:-}}")"
        gitea_seed_source_repo_branch_esc="$(escape_sed_replacement "${GITEA_SEED_SOURCE_REPO_BRANCH:-${ARGOCD_GITHUB_REPO_BRANCH:-master}}")"
        canonical_seed_source_token="${GITEA_SEED_SOURCE_TOKEN:-}"
        if [ -n "${repo_auth_fallback_token}" ]; then
          canonical_seed_source_token="${repo_auth_fallback_token}"
        elif [ -z "${canonical_seed_source_token}" ]; then
          canonical_seed_source_token="${ARGOCD_GITHUB_TOKEN:-}"
        fi
        gitea_seed_source_token_esc="$(escape_sed_replacement "${canonical_seed_source_token}")"
        gitea_seed_target_owner_esc="$(escape_sed_replacement "${GITEA_SEED_TARGET_OWNER:-gitea-admin}")"
        gitea_seed_target_repo_esc="$(escape_sed_replacement "${GITEA_SEED_TARGET_REPO:-cluster}")"
        mkdir -p "{{.KS_OUT_DIR}}"
        ks_file="{{.KS_SRC_DIR}}/{{.KS_TEMPLATE_FILE_NAME}}"
        if [ ! -f "${ks_file}" ]; then
          echo "Missing kickstart template: ${ks_file}"
          exit 1
        fi
        out="{{.KS_OUT_DIR}}/$(basename "${ks_file}")"
        mkdir -p "$(dirname "$out")"
        KS_FILE_PATH="${ks_file}" \
        KS_OUT_PATH="${out}" \
        BOOTSTRAP_BUNDLE_URL_RENDERED="${bootstrap_bundle_url_rendered:-}" \
        BOOTSTRAP_RUNTIME_ENV_URL_RENDERED="${bootstrap_runtime_env_url_rendered:-}" \
        BOOTSTRAP_BACKUP_URL_RENDERED="${bootstrap_backup_url_rendered:-}" \
        GITEA_SEED_SOURCE_REPO_URL_RENDERED="${GITEA_SEED_SOURCE_REPO_URL:-${ARGOCD_GITHUB_REPO_URL:-}}" \
        GITEA_SEED_SOURCE_REPO_BRANCH_RENDERED="${GITEA_SEED_SOURCE_REPO_BRANCH:-${ARGOCD_GITHUB_REPO_BRANCH:-master}}" \
        GITEA_SEED_TARGET_OWNER_RENDERED="${GITEA_SEED_TARGET_OWNER:-gitea-admin}" \
        GITEA_SEED_TARGET_REPO_RENDERED="${GITEA_SEED_TARGET_REPO:-cluster}" \
        python3 - <<'PY'
        import os

        ks_file = os.environ["KS_FILE_PATH"]
        out_path = os.environ["KS_OUT_PATH"]
        with open(ks_file, "r", encoding="utf-8") as fh:
            content = fh.read()

        def clean(key, default=""):
            value = os.environ.get(key, default)
            if value is None:
                value = default
            return value.replace("\r", "").replace("\n", "")

        placeholders = {
            "__TAILSCALE_OAUTH_CLIENT_ID__": clean("TAILSCALE_OAUTH_CLIENT_ID"),
            "__TAILSCALE_OAUTH_TTL__": clean("TAILSCALE_OAUTH_TTL", "1h"),
            "__TAILSCALE_ADVERTISE_TAGS__": clean("TAILSCALE_ADVERTISE_TAGS"),
            "__TAILSCALE_NODE_ROLE__": clean("TAILSCALE_NODE_ROLE"),
            "__TAILSCALE_CLUSTER_TAG__": clean("TAILSCALE_CLUSTER_TAG", "tag:cluster"),
            "__TAILSCALE_ENFORCE_EXIT_NODE__": clean("TAILSCALE_ENFORCE_EXIT_NODE"),
            "__TAILSCALE_EXIT_NODE__": clean("TAILSCALE_EXIT_NODE"),
            "__TAILSCALE_EXIT_NODE_ALLOW_LAN_ACCESS__": clean("TAILSCALE_EXIT_NODE_ALLOW_LAN_ACCESS"),
            "__KS_BREAKGLASS__": clean("KS_BREAKGLASS"),
            "__KS_EMBED_REPO__": clean("KS_EMBED_REPO"),
            "__PLATFORM_DISTRIBUTION__": clean("PLATFORM_DISTRIBUTION"),
            "__ANSIBLE_RUNNER_IMAGE__": clean("ANSIBLE_RUNNER_IMAGE"),
            "__ANSIBLE_RUNNER_REPO__": clean("ANSIBLE_RUNNER_REPO"),
            "__ANSIBLE_RUNNER_GIT_HOST__": clean("ANSIBLE_RUNNER_GIT_HOST"),
            "__ANSIBLE_RUNNER_GIT_HTTP_VERSION__": clean("ANSIBLE_RUNNER_GIT_HTTP_VERSION"),
            "__ANSIBLE_RUNNER_UPDATE_FROM_REPO__": clean("ANSIBLE_RUNNER_UPDATE_FROM_REPO"),
            "__ARGOCD_GITHUB_REPO_URL__": clean("ARGOCD_GITHUB_REPO_URL"),
            "__ARGOCD_GITHUB_USERNAME__": clean("ARGOCD_GITHUB_USERNAME"),
            "__ARGOCD_GITHUB_REPO_BRANCH__": clean("ARGOCD_GITHUB_REPO_BRANCH"),
            "__GITEA_SEED_SOURCE_REPO_URL__": clean("GITEA_SEED_SOURCE_REPO_URL_RENDERED"),
            "__GITEA_SEED_SOURCE_REPO_BRANCH__": clean("GITEA_SEED_SOURCE_REPO_BRANCH_RENDERED"),
            "__GITEA_SEED_TARGET_OWNER__": clean("GITEA_SEED_TARGET_OWNER_RENDERED"),
            "__GITEA_SEED_TARGET_REPO__": clean("GITEA_SEED_TARGET_REPO_RENDERED"),
            "__GITHUB_APP_ID__": clean("GITHUB_APP_ID"),
            "__GITHUB_APP_INSTALLATION_ID__": clean("GITHUB_APP_INSTALLATION_ID"),
            "__RANCHER_PUBLIC_DOMAIN__": clean("RANCHER_PUBLIC_DOMAIN"),
            "__CLUSTER_DOMAIN__": clean("CLUSTER_DOMAIN"),
            "__CLUSTER_LOCAL_DOMAIN__": clean("CLUSTER_LOCAL_DOMAIN"),
            "__RANCHER_ADMIN_PASSWORD_FILE__": clean("RANCHER_ADMIN_PASSWORD_FILE"),
            "__KS_LOG_UPLOAD_EVENTUAL__": clean("KS_LOG_UPLOAD_EVENTUAL", "1"),
            "__KS_LOG_UPLOAD_DEBUG__": clean("KS_LOG_UPLOAD_DEBUG", "0"),
            "__FIRSTBOOT_NO_POWEROFF__": clean("FIRSTBOOT_NO_POWEROFF", "0"),
            "__KS_STATIC_HOSTNAME__": clean("KS_STATIC_HOSTNAME"),
            "__KS_STATIC_IPV4__": clean("KS_STATIC_IPV4"),
            "__KS_STATIC_GW__": clean("KS_STATIC_GW"),
            "__KS_STATIC_DNS__": clean("KS_STATIC_DNS"),
            "__BOOTSTRAP_DEBUG_USER__": clean("BOOTSTRAP_DEBUG_USER"),
            "__BOOTSTRAP_DEBUG_SUDO__": clean("BOOTSTRAP_DEBUG_SUDO", "0"),
            "__BOOTSTRAP_DIAGNOSTICS_TAILSCALE__": clean("BOOTSTRAP_DIAGNOSTICS_TAILSCALE", "0"),
            "__BOOTSTRAP_BUNDLE_URL__": clean("BOOTSTRAP_BUNDLE_URL_RENDERED"),
            "__BOOTSTRAP_BUNDLE_SHA256__": clean("BOOTSTRAP_BUNDLE_SHA256"),
            "__BOOTSTRAP_BUNDLE_FORCE__": clean("BOOTSTRAP_BUNDLE_FORCE"),
            "__BOOTSTRAP_PLAYBOOK__": clean("BOOTSTRAP_PLAYBOOK"),
            "__BOOTSTRAP_RUN_PHASE40__": clean("BOOTSTRAP_RUN_PHASE40"),
            "__BOOTSTRAP_PHASE40_MODE__": clean("BOOTSTRAP_PHASE40_MODE"),
            "__BOOTSTRAP_RUN_PHASE50__": clean("BOOTSTRAP_RUN_PHASE50"),
            "__BOOTSTRAP_RUN_PHASE60__": clean("BOOTSTRAP_RUN_PHASE60"),
            "__BOOTSTRAP_INTRODUCE_OPENBAO__": clean("BOOTSTRAP_INTRODUCE_OPENBAO"),
            "__BOOTSTRAP_OPENBAO_CREATE_TOKEN_SECRET__": clean("BOOTSTRAP_OPENBAO_CREATE_TOKEN_SECRET"),
            "__BOOTSTRAP_DISABLE_PRE_OPENBAO__": clean("BOOTSTRAP_DISABLE_PRE_OPENBAO"),
            "__BOOTSTRAP_OPENBAO_AUTO_UNSEAL__": clean("BOOTSTRAP_OPENBAO_AUTO_UNSEAL"),
            "__BOOTSTRAP_BURN_LADDER__": clean("BOOTSTRAP_BURN_LADDER"),
            "__BOOTSTRAP_BACKUP_TO_R2__": clean("BOOTSTRAP_BACKUP_TO_R2"),
            "__BOOTSTRAP_BACKUP_URL__": clean("BOOTSTRAP_BACKUP_URL_RENDERED"),
            "__BOOTSTRAP_BACKUP_FORMAT__": clean("BOOTSTRAP_BACKUP_FORMAT"),
            "__BOOTSTRAP_BACKUP_FILE__": clean("BOOTSTRAP_BACKUP_FILE"),
            "__BOOTSTRAP_BACKUP_FILE_OPENSSL__": clean("BOOTSTRAP_BACKUP_FILE_OPENSSL"),
            "__BOOTSTRAP_BACKUP_FILE_7Z__": clean("BOOTSTRAP_BACKUP_FILE_7Z"),
            "__INGRESS_INTERNAL_VIP__": clean("INGRESS_INTERNAL_VIP"),
            "__INGRESS_EXTERNAL_VIP__": clean("INGRESS_EXTERNAL_VIP"),
            "__BOOTSTRAP_RUNTIME_ENV_URL__": clean("BOOTSTRAP_RUNTIME_ENV_URL_RENDERED"),
            "__BOOTSTRAP_SHARED_TOKEN__": clean("KS_SHARED_TOKEN"),
            "__KS_LOG_URL__": clean("KS_LOG_URL"),
        }
        for placeholder, value in placeholders.items():
            content = content.replace(placeholder, value)
        content = content.replace("\r\n", "\n").replace("\r", "\n")
        with open(out_path, "w", encoding="utf-8", newline="\n") as fh:
            fh.write(content)
        PY

        # Fail fast on missing critical substitutions so we do not produce a
        # "successful" ISO that has no first-boot telemetry.
        if rg -n "__KS_LOG_URL__|__TAILSCALE_OAUTH_CLIENT_ID__|__TAILSCALE_CLUSTER_TAG__|__BOOTSTRAP_RUNTIME_ENV_URL__|__BOOTSTRAP_SHARED_TOKEN__" "${out}" >/dev/null 2>&1; then
          echo "Kickstart render failed: unresolved placeholders remain in ${out}"
          rg -n "__KS_LOG_URL__|__TAILSCALE_OAUTH_CLIENT_ID__|__TAILSCALE_CLUSTER_TAG__|__BOOTSTRAP_RUNTIME_ENV_URL__|__BOOTSTRAP_SHARED_TOKEN__" "${out}" || true
          exit 1
        fi
        if rg -n '^LOG_UPLOAD_URL=""$' "${out}" >/dev/null 2>&1; then
          echo "Kickstart render failed: LOG_UPLOAD_URL is empty in ${out}."
          echo "Set KS_LOG_URL (or KS_BASE_URL) in .env before building the ISO."
          exit 1
        fi
        if rg -n '^TAILSCALE_OAUTH_CLIENT_ID=""$|^BOOTSTRAP_SHARED_TOKEN=""$|^BOOTSTRAP_RUNTIME_ENV_URL=""$' "${out}" >/dev/null 2>&1; then
          echo "Kickstart render failed: required non-secret bootstrap settings are empty in ${out}."
          exit 1
        fi
        python3 -c 'import os,sys; path=sys.argv[1]; content=open(path, "r", encoding="utf-8").read(); secret_keys=["TAILSCALE_AUTHKEY","TAILSCALE_OAUTH_CLIENT_SECRET","ANSIBLE_RUNNER_HTTP_TOKEN","ANSIBLE_RUNNER_DEPLOY_KEY_B64","ARGOCD_GITHUB_TOKEN","CLOUDFLARE_API_TOKEN","CLOUDFLARE_ZONE_API_TOKEN","GITHUB_APP_PRIVATE_KEY_B64","GITEA_SEED_SOURCE_TOKEN","RANCHER_CLOUDFLARED_TUNNEL_TOKEN","BOOTSTRAP_BACKUP_PASSPHRASE","BOOTSTRAP_BACKUP_PASSPHRASE_B64","RANCHER_ADMIN_PASSWORD","BOOTSTRAP_DEBUG_PASSWORD","BOOTSTRAP_DEBUG_PASSWORD_HASH","BOOTSTRAP_DEBUG_SSH_KEY"]; hits=[key for key in secret_keys if (os.environ.get(key) or "").strip() and (os.environ.get(key) or "").strip() in content]; sys.stderr.write("Kickstart render failed: secret values leaked into %s: %s\n" % (path, ", ".join(hits))) if hits else None; sys.exit(1 if hits else 0)' "${out}"

  serve:
    internal: true
    desc: Serve kickstart files over HTTP (macOS)
    deps: [':hooks:ensure', render]
    cmds:
      - |
        set -e
        ks_dir="{{.KS_OUT_DIR}}"
        if [ ! -d "${ks_dir}" ]; then
          ks_dir="{{.KS_SRC_DIR}}"
        fi
        ks_name="{{.KS_TEMPLATE_FILE_NAME}}"
        if [ -n "${ks_name}" ] && [ -f "${ks_dir}/${ks_name}" ]; then
          if rg -n "%post.*--erroronfail" "${ks_dir}/${ks_name}" >/dev/null 2>&1; then
            echo "WARNING: ${ks_dir}/${ks_name} still contains %post --erroronfail"
            echo "Run: task ks:render (this task now depends on it) and ensure you're booting the updated kickstart."
          fi
        fi
        ks_env="${KS_ENV:-.env}"
        if [ -f "${ks_env}" ]; then
          set -a
          . "${ks_env}"
          set +a
        fi
        ip=""
        if [ -z "${ip}" ] && command -v ipconfig >/dev/null 2>&1; then
          ip="$(ipconfig getifaddr en0 || true)"
          if [ -z "${ip}" ]; then
            ip="$(ipconfig getifaddr en1 || true)"
          fi
        fi
        if [ -z "${ip}" ] && command -v hostname >/dev/null 2>&1; then
          ip="$(hostname -I 2>/dev/null | awk '{print $1}')"
        fi
        if [ -z "${ip}" ] && command -v ip >/dev/null 2>&1; then
          ip="$(ip route get 1.1.1.1 2>/dev/null | awk '{for (i=1;i<=NF;i++) if ($i=="src") {print $(i+1); exit}}')"
        fi
        if [ -z "${ip}" ]; then
          echo "Unable to detect local IP (tried en0/en1)"
          exit 1
        fi
        token="${KS_FILE_AUTH_TOKEN:-${KS_SHARED_TOKEN:-}}"
        ks_url_env="${KS_FILE_URL:-}"
        log_url="${KS_LOG_URL:-}"
        force_local_logs="${KS_FORCE_LOCAL_LOGS:-}"
        if [ "${force_local_logs}" = "1" ] || [ "${force_local_logs}" = "true" ]; then
          log_url="http://${ip}:8000/logs"
        fi
        if [ -n "${ks_url_env}" ] && [ -z "${log_url}" ]; then
          base="$(
            python3 -c 'import os,urllib.parse; url=os.environ.get("KS_FILE_URL",""); parsed=urllib.parse.urlparse(url); print(f"{parsed.scheme}://{parsed.netloc}") if parsed.scheme and parsed.netloc else None'
          )"
          if [ -n "${base}" ]; then
            log_url="${base}/logs"
          fi
        fi
        if [ -z "${ks_url_env}" ]; then
          if [ -z "${ks_name}" ]; then
            echo "Set KS_TEMPLATE_FILE_NAME or KS_FILE_URL to serve a kickstart file."
            exit 1
          fi
          ks_url_env="http://${ip}:8000/${ks_name}"
        fi
        if [ -z "${log_url}" ]; then
          log_url="http://${ip}:8000/logs"
        fi
        repo_root="$(pwd -P)"
        echo "Serving ${ks_dir} at http://${ip}:8000/"
        if [ -n "${token}" ]; then
          if echo "${ks_url_env}" | grep -q '?'; then
            ks_url_env="${ks_url_env}&token=${token}"
          else
            ks_url_env="${ks_url_env}?token=${token}"
          fi
          if echo "${log_url}" | grep -q '?'; then
            log_url="${log_url}&token=${token}"
          else
            log_url="${log_url}?token=${token}"
          fi
          echo "Boot arg: inst.ks=${ks_url_env}"
          echo "Log upload endpoint: ${log_url}"
        else
          echo "Boot arg: inst.ks=${ks_url_env}"
          echo "Log upload endpoint: ${log_url}"
        fi
        echo "Log uploads saved to: dist/ks-logs/"
        cd "${ks_dir}"
        REPO_ROOT="${repo_root}" KS_FILE_AUTH_TOKEN="${token}" python3 - <<'PY'
        import datetime
        import http.server
        import os
        import urllib.parse

        repo_root = os.environ.get("REPO_ROOT") or os.getcwd()
        auth_token = (os.environ.get("KS_FILE_AUTH_TOKEN") or "").strip()
        port = 8000
        log_dir = os.path.join(repo_root, "dist", "ks-logs")
        os.makedirs(log_dir, exist_ok=True)

        class Handler(http.server.SimpleHTTPRequestHandler):
            def _token_ok(self):
                if not auth_token:
                    return True
                header_token = (self.headers.get("X-KS-Token") or "").strip()
                parsed = urllib.parse.urlparse(self.path)
                qs = urllib.parse.parse_qs(parsed.query)
                query_token = (qs.get("token") or [""])[0].strip()
                return header_token == auth_token or query_token == auth_token

            def do_GET(self):
                if not self._token_ok():
                    self.send_response(401)
                    self.end_headers()
                    self.wfile.write(b"unauthorized\n")
                    return
                super().do_GET()

            def do_POST(self):
                if not self._token_ok():
                    self.send_response(401)
                    self.end_headers()
                    self.wfile.write(b"unauthorized\n")
                    return
                parsed = urllib.parse.urlparse(self.path)
                if not parsed.path.startswith("/logs"):
                    self.send_response(404)
                    self.end_headers()
                    return
                length = int(self.headers.get("Content-Length", "0"))
                payload = self.rfile.read(length)
                qs = urllib.parse.parse_qs(parsed.query)
                host = (qs.get("host") or ["unknown"])[0].strip() or "unknown"
                file_param = (qs.get("file") or [""])[0].strip()
                if file_param:
                    safe_name = os.path.basename(file_param)
                    filename = f"{host}-{safe_name}"
                else:
                    name = (qs.get("name") or ["log"])[0].strip() or "log"
                    ts = datetime.datetime.utcnow().strftime("%Y%m%dT%H%M%SZ")
                    filename = f"{host}-{name}-{ts}.log"
                path = os.path.join(log_dir, filename)
                with open(path, "wb") as fh:
                    fh.write(payload)
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok\n")

        try:
            http.server.ThreadingHTTPServer(("", port), Handler).serve_forever()
        except KeyboardInterrupt:
            pass
        PY

  log-test:
    internal: true
    desc: Upload a small test log payload to the KS log endpoint
    deps: [':hooks:ensure']
    cmds:
      - |
        set -e
        ks_env="${KS_ENV:-.env}"
        if [ -f "${ks_env}" ]; then
          set -a
          . "${ks_env}"
          set +a
        fi
        ip=""
        if [ -z "${ip}" ] && command -v ipconfig >/dev/null 2>&1; then
          ip="$(ipconfig getifaddr en0 || true)"
          if [ -z "${ip}" ]; then
            ip="$(ipconfig getifaddr en1 || true)"
          fi
        fi
        if [ -z "${ip}" ] && command -v hostname >/dev/null 2>&1; then
          ip="$(hostname -I 2>/dev/null | awk '{print $1}')"
        fi
        if [ -z "${ip}" ] && command -v ip >/dev/null 2>&1; then
          ip="$(ip route get 1.1.1.1 2>/dev/null | awk '{for (i=1;i<=NF;i++) if ($i=="src") {print $(i+1); exit}}')"
        fi
        if [ -z "${ip}" ]; then
          echo "Unable to detect local IP (tried en0/en1)"
          exit 1
        fi
        token="${KS_FILE_AUTH_TOKEN:-${KS_SHARED_TOKEN:-}}"
        ks_url_env="${KS_FILE_URL:-}"
        log_url="${KS_LOG_URL:-}"
        force_local_logs="${KS_FORCE_LOCAL_LOGS:-}"
        if [ "${force_local_logs}" = "1" ] || [ "${force_local_logs}" = "true" ]; then
          log_url="http://${ip}:8000/logs"
        fi
        if [ -n "${ks_url_env}" ] && [ -z "${log_url}" ]; then
          base="$(
            python3 -c 'import os,urllib.parse; url=os.environ.get("KS_FILE_URL",""); parsed=urllib.parse.urlparse(url); print(f"{parsed.scheme}://{parsed.netloc}") if parsed.scheme and parsed.netloc else None'
          )"
          if [ -n "${base}" ]; then
            log_url="${base}/logs"
          fi
        fi
        if [ -z "${log_url}" ]; then
          log_url="http://${ip}:8000/logs"
        fi
        if [ -n "${token}" ]; then
          if echo "${log_url}" | grep -q '?'; then
            log_url="${log_url}&token=${token}"
          else
            log_url="${log_url}?token=${token}"
          fi
        fi

        host="${LOG_HOST:-$(hostname -s 2>/dev/null || echo node-bootstrap)}"
        filename="${LOG_TEST_FILE_NAME:-manual-test.log}"
        payload="log-test $(date -u +"%Y-%m-%dT%H:%M:%SZ") host=${host} file=${filename}"

        redact_url() {
          printf '%s' "${1:-}" | sed -E 's/([?&]token=)[^&]+/\1REDACTED/g'
        }

        sep="?"
        if echo "${log_url}" | grep -q '?'; then
          sep="&"
        fi
        test_url="${log_url}${sep}host=${host}&file=${filename}"
        if [ "${LOG_TEST_SHOW_URL:-0}" = "1" ] || [ "${LOG_TEST_SHOW_URL:-0}" = "true" ]; then
          echo "Posting test log to: ${test_url}"
        else
          echo "Posting test log to: $(redact_url "${test_url}")"
        fi

        response_file="$(mktemp)"
        curl_rc=0
        set +e
        http_code="$(curl --http1.1 -sS -o "${response_file}" -w "%{http_code}" --connect-timeout 3 --max-time 10 --retry 2 -X POST \
          --data-binary "${payload}" \
          "${test_url}")"
        curl_rc=$?
        set -e
        if [ "${curl_rc}" != "0" ] || [ -z "${http_code}" ] || [ "${http_code}" = "000" ]; then
          echo "Log upload failed (rc=${curl_rc}, http_code=${http_code:-<empty>})"
          if [ -s "${response_file}" ]; then
            response_snip="$(head -c 200 "${response_file}" | tr '\n' ' ')"
            if [ -n "${response_snip}" ]; then
              echo "Log upload response: ${response_snip}"
            fi
          fi
          rm -f "${response_file}" 2>/dev/null || true
          exit 1
        fi
        if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
          echo "Log upload rejected (http=${http_code})"
          if [ -s "${response_file}" ]; then
            response_snip="$(head -c 200 "${response_file}" | tr '\n' ' ')"
            if [ -n "${response_snip}" ]; then
              echo "Log upload response: ${response_snip}"
            fi
          fi
          rm -f "${response_file}" 2>/dev/null || true
          exit 1
        fi
        echo "Log upload ok (http=${http_code})"
        rm -f "${response_file}" 2>/dev/null || true
        echo "Log upload test completed."

