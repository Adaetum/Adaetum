  backup:extract:
    internal: true
    desc: Extract an emergency kit by BACKUP_HOST (auto-detect file in repo root or dist/ks-backups)
    cmds:
      - |
        set -euo pipefail

        # Support both:
        # - env vars: BACKUP_HOST=... task ks:backup:extract
        # - task vars: task ks:backup:extract BACKUP_HOST=...
        task_backup_host="{{.BACKUP_HOST | default ""}}"
        task_backup_file="{{.BACKUP_FILE | default ""}}"
        task_out_dir="{{.OUT_DIR | default ""}}"

        host="${BACKUP_HOST:-${NODE_ID:-${task_backup_host:-}}}"
        if [ -z "${host}" ]; then
          echo "Missing BACKUP_HOST (or NODE_ID)." >&2
          echo "Examples:" >&2
          echo "  BACKUP_HOST=node-00380 task ks:backup:extract" >&2
          echo "  task ks:backup:extract BACKUP_HOST=node-00380" >&2
          exit 1
        fi

        # Optional: specify BACKUP_FILE when you know the exact file name.
        # Example values:
        # - bootstrap-emergency-kit.tar.gz.enc
        # - bootstrap-emergency-kit.7z
        name="${BACKUP_FILE:-${task_backup_file:-}}"

        # Prefer format based on env (if present). Default: openssl.
        prefer="${BACKUP_PREFER:-${BOOTSTRAP_BACKUP_FORMAT:-openssl}}"
        prefer="$(printf '%s' "${prefer}" | tr '[:upper:]' '[:lower:]')"

        candidates=""
        add_cand() {
          f="${1:?}"
          if [ -f "${f}" ]; then
            printf '%s\n' "${f}"
          fi
        }

        pick_first() {
          while IFS= read -r f; do
            [ -n "${f}" ] || continue
            if [ -f "${f}" ]; then
              printf '%s\n' "${f}"
              return 0
            fi
          done
          return 1
        }

        if [ -n "${name}" ]; then
          # Accept either the raw file name or the host-prefixed name.
          path="$(
            {
              printf '%s\n' "dist/ks-backups/${host}-${name}"
              printf '%s\n' "dist/ks-backups/${name}"
              printf '%s\n' "${host}-${name}"
              printf '%s\n' "${name}"
            } | pick_first || true
          )"
        else
          # Auto-detect: look for the common names in both dist/ks-backups and repo root.
          # We also accept a bare `bootstrap-emergency-kit.*` dropped in the repo root.
          enc="bootstrap-emergency-kit.tar.gz.enc"
          seven="bootstrap-emergency-kit.7z"
          # Some users copy files out of a backup system with an added prefix.
          seven_prefixed="backups_${host}_bootstrap-emergency-kit.7z"
          enc_prefixed="backups_${host}_bootstrap-emergency-kit.tar.gz.enc"
          path=""
          if [ "${prefer}" = "7z" ]; then
            path="$(
              {
                printf '%s\n' "dist/ks-backups/${host}-${seven}"
                printf '%s\n' "dist/ks-backups/${host}-bootstrap-emergency-kit.7z"
                printf '%s\n' "dist/ks-backups/${seven_prefixed}"
                printf '%s\n' "${host}-${seven}"
                printf '%s\n' "${host}-bootstrap-emergency-kit.7z"
                printf '%s\n' "${seven_prefixed}"
                printf '%s\n' "dist/ks-backups/${seven}"
                printf '%s\n' "${seven}"
                printf '%s\n' "dist/ks-backups/${host}-${enc}"
                printf '%s\n' "dist/ks-backups/${host}-bootstrap-emergency-kit.tar.gz.enc"
                printf '%s\n' "dist/ks-backups/${enc_prefixed}"
                printf '%s\n' "${host}-${enc}"
                printf '%s\n' "${host}-bootstrap-emergency-kit.tar.gz.enc"
                printf '%s\n' "${enc_prefixed}"
                printf '%s\n' "dist/ks-backups/${enc}"
                printf '%s\n' "${enc}"
              } | pick_first || true
            )"
          else
            # openssl|both|unknown => prefer .enc first.
            path="$(
              {
                printf '%s\n' "dist/ks-backups/${host}-${enc}"
                printf '%s\n' "dist/ks-backups/${host}-bootstrap-emergency-kit.tar.gz.enc"
                printf '%s\n' "dist/ks-backups/${enc_prefixed}"
                printf '%s\n' "${host}-${enc}"
                printf '%s\n' "${host}-bootstrap-emergency-kit.tar.gz.enc"
                printf '%s\n' "${enc_prefixed}"
                printf '%s\n' "dist/ks-backups/${enc}"
                printf '%s\n' "${enc}"
                printf '%s\n' "dist/ks-backups/${host}-${seven}"
                printf '%s\n' "dist/ks-backups/${host}-bootstrap-emergency-kit.7z"
                printf '%s\n' "dist/ks-backups/${seven_prefixed}"
                printf '%s\n' "${host}-${seven}"
                printf '%s\n' "${host}-bootstrap-emergency-kit.7z"
                printf '%s\n' "${seven_prefixed}"
                printf '%s\n' "dist/ks-backups/${seven}"
                printf '%s\n' "${seven}"
              } | pick_first || true
            )"
          fi
        fi

        if [ -z "${path}" ] || [ ! -f "${path}" ]; then
          echo "Could not find an emergency kit file for host=${host}." >&2
          echo "Looked in repo root and dist/ks-backups." >&2
          echo "Fix options:" >&2
          echo "  - Put the file in the repo root (examples: bootstrap-emergency-kit.tar.gz.enc, bootstrap-emergency-kit.7z, backups_${host}_bootstrap-emergency-kit.7z), OR" >&2
          echo "  - Download it: task ks:backup:download BACKUP_HOST=${host} BACKUP_FILE=bootstrap-emergency-kit.tar.gz.enc" >&2
          echo "  - Or specify BACKUP_FILE explicitly." >&2
          exit 1
        fi

        out_dir="${OUT_DIR:-${task_out_dir:-}}"
        if [ -z "${out_dir}" ]; then
          out_dir="dist/ks-backups/extracted/${host}"
        fi
        mkdir -p "${out_dir}"

        echo "[ks:backup:extract] using ${path}"
        if printf '%s' "${path}" | rg -q "\\.7z$"; then
          task ks:backup:extract-7z BACKUP_PATH="${path}" OUT_DIR="${out_dir}"
        elif printf '%s' "${path}" | rg -q "\\.enc$"; then
          task ks:backup:extract-openssl BACKUP_PATH="${path}" OUT_DIR="${out_dir}"
        else
          echo "Unsupported kit file type (expected .7z or .enc): ${path}" >&2
          exit 1
        fi

  backup:test-7z:
    internal: true
    desc: Test that a downloaded .7z emergency kit can be opened with BOOTSTRAP_BACKUP_PASSPHRASE
    cmds:
      - |
        set -euo pipefail

        ks_env="${KS_ENV:-.env}"
        if [ -f "${ks_env}" ]; then
          set -a
          . "${ks_env}"
          set +a
        fi

        archive="{{.BACKUP_PATH | default ""}}"
        if [ -z "${archive}" ]; then
          echo "Set BACKUP_PATH to a local .7z file (example: dist/ks-backups/node-123-bootstrap-emergency-kit.7z)." >&2
          exit 1
        fi
        if command -v python3 >/dev/null 2>&1; then
          archive="$(python3 -c 'import os,sys; print(os.path.expanduser(sys.argv[1]))' "${archive}")"
        fi
        if [ ! -f "${archive}" ]; then
          echo "Missing BACKUP_PATH file: ${archive}" >&2
          exit 1
        fi

        if ! printf '%s' "${archive}" | rg -q "\\.7z$"; then
          echo "BACKUP_PATH must end with .7z (got: ${archive})." >&2
          exit 1
        fi

        pass="${BOOTSTRAP_BACKUP_PASSPHRASE:-}"
        if [ -z "${pass}" ] && [ -n "${BOOTSTRAP_BACKUP_PASSPHRASE_B64:-}" ]; then
          pass="$(python3 -c 'import base64,sys; sys.stdout.write(base64.b64decode(sys.argv[1].strip().encode()).decode("utf-8"))' "${BOOTSTRAP_BACKUP_PASSPHRASE_B64}")"
        fi
        if [ -z "${pass}" ]; then
          echo "Missing BOOTSTRAP_BACKUP_PASSPHRASE (or BOOTSTRAP_BACKUP_PASSPHRASE_B64)." >&2
          exit 1
        fi

        find_seven() {
          if command -v 7z >/dev/null 2>&1; then
            command -v 7z
            return 0
          fi
          if command -v 7za >/dev/null 2>&1; then
            command -v 7za
            return 0
          fi
          if command -v 7zz >/dev/null 2>&1; then
            command -v 7zz
            return 0
          fi
          if [ -x "/c/Program Files/7-Zip/7z.exe" ]; then
            printf '%s\n' "/c/Program Files/7-Zip/7z.exe"
            return 0
          fi
          return 1
        }

        ensure_seven() {
          local s=""
          s="$(find_seven || true)"
          if [ -n "${s}" ]; then
            printf '%s\n' "${s}"
            return 0
          fi
          case "$(uname -s)" in
            MINGW*|MSYS*|CYGWIN*)
              if command -v powershell.exe >/dev/null 2>&1; then
                powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "./tasks/scripts/install-7zip.ps1" >/dev/null 2>&1 || true
              fi
              ;;
          esac
          s="$(find_seven || true)"
          if [ -n "${s}" ]; then
            printf '%s\n' "${s}"
            return 0
          fi
          return 1
        }

        seven="$(ensure_seven || true)"
        if [ -z "${seven}" ]; then
          echo "7z is required to test .7z archives and auto-install did not succeed." >&2
          exit 1
        fi

        # `t` verifies the archive without extracting it.
        "${seven}" t -p"${pass}" "${archive}" >/dev/null
        echo "OK: password accepted for ${archive}"

  backup:extract-7z:
    internal: true
    desc: Extract a downloaded .7z emergency kit using BOOTSTRAP_BACKUP_PASSPHRASE (no GUI, avoids paste issues)
