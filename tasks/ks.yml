        fi
        if [ ! -f "${archive}" ]; then
          echo "Missing BACKUP_PATH file: ${archive}" >&2
          exit 1
        fi
        if ! printf '%s' "${archive}" | rg -q "\\.7z$"; then
          echo "BACKUP_PATH must end with .7z (got: ${archive})." >&2
          exit 1
        fi

        out_dir="{{.OUT_DIR | default ""}}"
        if [ -z "${out_dir}" ]; then
          out_dir="dist/ks-backups/extracted-7z"
        fi
        mkdir -p "${out_dir}"

        pass="${BOOTSTRAP_BACKUP_PASSPHRASE:-}"
        if [ -z "${pass}" ] && [ -n "${BOOTSTRAP_BACKUP_PASSPHRASE_B64:-}" ]; then
          pass="$(python3 -c 'import base64,sys; sys.stdout.write(base64.b64decode(sys.argv[1].strip().encode()).decode("utf-8"))' "${BOOTSTRAP_BACKUP_PASSPHRASE_B64}")"
        fi
        if [ -z "${pass}" ]; then
          echo "Missing BOOTSTRAP_BACKUP_PASSPHRASE (or BOOTSTRAP_BACKUP_PASSPHRASE_B64)." >&2
          exit 1
        fi

        find_seven() {
          if command -v 7z >/dev/null 2>&1; then
            command -v 7z
            return 0
          fi
          if command -v 7za >/dev/null 2>&1; then
            command -v 7za
            return 0
          fi
          if command -v 7zz >/dev/null 2>&1; then
            command -v 7zz
            return 0
          fi
          if [ -x "/c/Program Files/7-Zip/7z.exe" ]; then
            printf '%s\n' "/c/Program Files/7-Zip/7z.exe"
            return 0
          fi
          return 1
        }

        ensure_seven() {
          local s=""
          s="$(find_seven || true)"
          if [ -n "${s}" ]; then
            printf '%s\n' "${s}"
            return 0
          fi
          case "$(uname -s)" in
            MINGW*|MSYS*|CYGWIN*)
              if command -v powershell.exe >/dev/null 2>&1; then
                powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "./tasks/scripts/install-7zip.ps1" >/dev/null 2>&1 || true
              fi
              ;;
          esac
          s="$(find_seven || true)"
          if [ -n "${s}" ]; then
            printf '%s\n' "${s}"
            return 0
          fi
          return 1
        }

        seven="$(ensure_seven || true)"
        if [ -z "${seven}" ]; then
          echo "7z is required to extract .7z archives and auto-install did not succeed." >&2
          exit 1
        fi

        "${seven}" x -y -p"${pass}" -o"${out_dir}" "${archive}" >/dev/null
        echo "Extracted to ${out_dir}"

  backup:pbcopy-passphrase:
    internal: true
    desc: Copy BOOTSTRAP_BACKUP_PASSPHRASE to clipboard without a trailing newline (macOS)
    cmds:
      - |
        set -euo pipefail
        if ! command -v pbcopy >/dev/null 2>&1; then
          echo "pbcopy not found (this task is macOS-only)." >&2
          exit 1
        fi

        ks_env="${KS_ENV:-.env}"
        if [ -f "${ks_env}" ]; then
          set -a
          . "${ks_env}"
          set +a
        fi

        pass="${BOOTSTRAP_BACKUP_PASSPHRASE:-}"
        if [ -z "${pass}" ] && [ -n "${BOOTSTRAP_BACKUP_PASSPHRASE_B64:-}" ]; then
          pass="$(python3 -c 'import base64,sys; sys.stdout.write(base64.b64decode(sys.argv[1].strip().encode()).decode("utf-8"))' "${BOOTSTRAP_BACKUP_PASSPHRASE_B64}")"
        fi
        if [ -z "${pass}" ]; then
          echo "Missing BOOTSTRAP_BACKUP_PASSPHRASE (or BOOTSTRAP_BACKUP_PASSPHRASE_B64)." >&2
          exit 1
        fi

        printf '%s' "${pass}" | pbcopy
        echo "Copied BOOTSTRAP_BACKUP_PASSPHRASE to clipboard (no newline)."

  backup:extract-openssl:
    internal: true
    desc: Decrypt and extract a downloaded .tar.gz.enc emergency kit using OpenSSL + BOOTSTRAP_BACKUP_PASSPHRASE
    cmds:
      - |
        set -euo pipefail

        ks_env="${KS_ENV:-.env}"
        if [ -f "${ks_env}" ]; then
          set -a
          . "${ks_env}"
          set +a
        fi

        enc="{{.BACKUP_PATH | default ""}}"
        if [ -z "${enc}" ]; then
          echo "Set BACKUP_PATH to a local .enc file (example: dist/ks-backups/node-123-bootstrap-emergency-kit.tar.gz.enc)." >&2
          exit 1
        fi
        if command -v python3 >/dev/null 2>&1; then
          enc="$(python3 -c 'import os,sys; print(os.path.expanduser(sys.argv[1]))' "${enc}")"
        fi
        if [ ! -f "${enc}" ]; then
          echo "Missing BACKUP_PATH file: ${enc}" >&2
          exit 1
        fi
        if ! printf '%s' "${enc}" | rg -q "\\.enc$"; then
          echo "BACKUP_PATH must end with .enc (got: ${enc})." >&2
          exit 1
        fi

        pass="${BOOTSTRAP_BACKUP_PASSPHRASE:-}"
        if [ -z "${pass}" ] && [ -n "${BOOTSTRAP_BACKUP_PASSPHRASE_B64:-}" ]; then
          pass="$(python3 -c 'import base64,sys; sys.stdout.write(base64.b64decode(sys.argv[1].strip().encode()).decode("utf-8"))' "${BOOTSTRAP_BACKUP_PASSPHRASE_B64}")"
        fi
        if [ -z "${pass}" ]; then
          echo "Missing BOOTSTRAP_BACKUP_PASSPHRASE (or BOOTSTRAP_BACKUP_PASSPHRASE_B64)." >&2
          exit 1
        fi
        export BOOTSTRAP_BACKUP_PASSPHRASE="${pass}"

        out_dir="{{.OUT_DIR | default ""}}"
        if [ -z "${out_dir}" ]; then
          out_dir="dist/ks-backups/extracted"
        fi
        mkdir -p "${out_dir}"

        base="$(basename "${enc}")"
        base="${base%.enc}"
        tarball="${out_dir}/${base}"
        extract_dir="${out_dir}/${base%.tar.gz}"

        rm -f "${tarball}" 2>/dev/null || true
        # Prefer GCM; fall back to CBC if the file was created on a host where `openssl enc` lacks AEAD support.
        if ! openssl enc -d -aes-256-gcm -salt -pbkdf2 -iter 200000 \
          -in "${enc}" -out "${tarball}" \
          -pass env:BOOTSTRAP_BACKUP_PASSPHRASE >/dev/null 2>&1; then
          openssl enc -d -aes-256-cbc -salt -pbkdf2 -iter 200000 \
            -in "${enc}" -out "${tarball}" \
            -pass env:BOOTSTRAP_BACKUP_PASSPHRASE >/dev/null
        fi

        rm -rf "${extract_dir}" 2>/dev/null || true
        mkdir -p "${extract_dir}"
        tar -xzf "${tarball}" -C "${extract_dir}"
        echo "Extracted to ${extract_dir}"
